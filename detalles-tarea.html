<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de Tarea | Digital Core</title>
    <link rel="icon" href="Isotipo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { --sidebar-width: 260px; }
        body { display: flex; background: #f0f4f8; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        
        .sidebar { width: var(--sidebar-width); height: 100vh; background: var(--dark-blue); color: white; position: fixed; padding: 2rem 1rem; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-logo { width: 80%; margin-bottom: 3rem; padding-left: 1rem; }
        .nav-links { list-style: none; flex-grow: 1; padding: 0; }
        .nav-links a { display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 1rem; border-radius: 8px; transition: 0.3s; font-weight: 600; }
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 156, 225, 0.2); color: var(--neon-blue); }
        
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 2rem 3rem; }
        .detail-card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 800px; margin: auto; }
        
        .status-pill { padding: 8px 20px; border-radius: 50px; font-size: 0.85rem; font-weight: 800; display: inline-block; margin-bottom: 1.5rem; }
        .completed { background: #c6f6d5; color: #22543d; }
        .pending { background: #feebc8; color: #744210; }
        .request-active { border: 2px solid #feb2b2; background: #fff5f5; padding: 15px; border-radius: 10px; margin-top: 1rem; }

        .action-group { display: flex; gap: 15px; margin-top: 2.5rem; flex-wrap: wrap; }
        .btn-action { padding: 14px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; font-family: inherit; }
        .btn-delete { background: #fff5f5; color: #c53030; }
        .btn-complete { background: var(--neon-blue); color: white; }
        .btn-request { background: #edf2f7; color: #4a5568; }
        .admin-panel { border-top: 2px dashed #edf2f7; margin-top: 2.5rem; padding-top: 2rem; }
        
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span, .sidebar-logo { display: none; } .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 1.5rem; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <img src="Digital Core original.png" alt="Logo" class="sidebar-logo">
        <ul class="nav-links">
            <li><a href="panel-control.html"><i class='bx bxs-dashboard'></i> <span>Dashboard</span></a></li>
            <li><a href="mis-trabajos.html"><i class='bx bxs-briefcase'></i> <span>Mis Trabajos</span></a></li>
            <li><a href="colaboradores.html"><i class='bx bxs-group'></i> <span>Colaboradores</span></a></li>
            <li><a href="#"><i class='bx bxs-package'></i> <span>Catálogo</span></a></li>
        </ul>
        <button id="logoutBtn" style="background:none; border:none; color:#ff6b6b; cursor:pointer; display:flex; align-items:center; gap:15px; padding:12px 1rem; font-weight:600; margin-top: auto;">
            <i class='bx bx-log-out'></i> <span>Cerrar Sesión</span>
        </button>
    </aside>

    <main class="main-content">
        <div id="loader" style="text-align: center; padding: 5rem;">
            <i class='bx bx-loader-alt bx-spin' style="font-size: 3rem; color: var(--neon-blue);"></i>
            <p style="color: #666; margin-top: 1rem;">Accediendo a la ficha técnica...</p>
        </div>
        
        <div id="taskDetail" class="detail-card" style="display: none;">
            <div id="statusBadge" class="status-pill"></div>
            <h1 id="tProduct" style="color: var(--dark-blue); font-weight: 900; font-size: 2.2rem; margin: 0;"></h1>
            <p id="tCategory" style="color: var(--light-blue); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;"></p>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 2rem 0;">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; color: #4a5568; line-height: 1.6;">
                <div><small style="text-transform: uppercase; font-weight: 800; color: #a0aec0;">Cliente</small><br><span id="tClient" style="font-weight: 600; font-size: 1.1rem;"></span></div>
                <div><small style="text-transform: uppercase; font-weight: 800; color: #a0aec0;">Fecha Límite</small><br><span id="tDeadline" style="font-weight: 600; font-size: 1.1rem;"></span></div>
                <div><small style="text-transform: uppercase; font-weight: 800; color: #a0aec0;">Responsables</small><br><span id="tAssignees" style="font-weight: 600; font-size: 0.9rem;"></span></div>
                <div><small style="text-transform: uppercase; font-weight: 800; color: #a0aec0;">Avance Actual</small><br><span id="tProgress" style="font-weight: 900; color: var(--neon-blue); font-size: 1.1rem;"></span>%</div>
            </div>

            <div id="requestAlert" class="request-active" style="display: none;">
                <p style="margin: 0; font-weight: 700; color: #c53030;"><i class='bx bxs-error-circle'></i> Hay una solicitud pendiente del colaborador para esta tarea.</p>
            </div>

            <div class="action-group">
                <button id="btnMarkComplete" class="btn-action btn-complete"><i class='bx bx-check-double'></i> Finalizar Tarea</button>
                <button id="btnRequestDelete" class="btn-action btn-request" style="display:none;"><i class='bx bx-trash'></i> Solicitar Borrado</button>
                <button id="btnRequestUnmark" class="btn-action btn-request" style="display:none;"><i class='bx bx-undo'></i> Solicitar Reabrir</button>
            </div>

            <div id="adminPanel" class="admin-panel" style="display: none;">
                <h3 style="color: var(--dark-blue); font-weight: 900;"><i class='bx bxs-lock-open-alt'></i> Herramientas de Lead Engineer</h3>
                <div class="action-group" style="margin-top: 1.5rem;">
                    <button id="btnAdminDelete" class="btn-action btn-delete"><i class='bx bxs-trash-alt'></i> Eliminar Tarea</button>
                    <button id="btnAdminUnmark" class="btn-action btn-request"><i class='bx bx-reset'></i> Forzar Apertura</button>
                </div>
                <div style="margin-top: 2rem; background: #f8fafc; padding: 1.5rem; border-radius: 12px;">
                    <label style="font-weight: 700; color: var(--dark-blue); font-size: 0.9rem;">Reasignar Equipo (Correos separados por coma):</label>
                    <input type="text" id="newAssignees" class="form-control" style="margin: 10px 0;">
                    <button id="btnUpdateTeam" class="btn-primary" style="width: auto; padding: 10px 25px; margin: 0;">Actualizar Asignación</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ",
            authDomain: "digital-core-app.firebaseapp.com",
            projectId: "digital-core-app",
            storageBucket: "digital-core-app.firebasestorage.app",
            messagingSenderId: "1003292240722",
            appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b",
            measurementId: "G-SX61ZVLJF0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('id');

        onAuthStateChanged(auth, (user) => {
            if (user && taskId) {
                const isAdmin = user.email.toLowerCase().trim() === 'diego.725.reyes@gmail.com';
                document.getElementById('userEmailLabel').innerText = user.email;
                abrirFicha(taskId, isAdmin);
            } else if (!taskId) {
                alert("ID de tarea no válido.");
                window.location.href = 'panel-control.html';
            } else {
                window.location.href = 'intranet.html';
            }
        });

        function abrirFicha(id, isAdmin) {
            onSnapshot(doc(db, "proyectos", id), (snap) => {
                if (!snap.exists()) {
                    alert("Esta tarea ha sido eliminada del sistema.");
                    window.location.href = 'panel-control.html';
                    return;
                }
                const t = snap.data();
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('taskDetail').style.display = 'block';

                // Llenar datos básicos
                document.getElementById('tProduct').innerText = t.producto;
                document.getElementById('tCategory').innerText = t.categoria;
                document.getElementById('tClient').innerText = t.cliente;
                document.getElementById('tDeadline').innerText = t.entrega;
                document.getElementById('tProgress').innerText = t.progreso;
                document.getElementById('tAssignees').innerText = Array.isArray(t.asignado_a) ? t.asignado_a.join(', ') : t.asignado_a;

                // Estado Visual
                const badge = document.getElementById('statusBadge');
                badge.innerText = t.completado ? "✓ TAREA COMPLETADA" : "⟳ TAREA EN CURSO";
                badge.className = `status-pill ${t.completado ? 'completed' : 'pending'}`;

                // Visibilidad de solicitudes
                const alertBox = document.getElementById('requestAlert');
                alertBox.style.display = (t.solicitud_eliminacion || t.solicitud_desmarcar) ? 'block' : 'none';

                // Lógica de botones por Rol
                const btnComplete = document.getElementById('btnMarkComplete');
                btnComplete.disabled = t.completado;
                btnComplete.style.opacity = t.completado ? "0.3" : "1";

                if (isAdmin) {
                    document.getElementById('adminPanel').style.display = 'block';
                    document.getElementById('newAssignees').value = Array.isArray(t.asignado_a) ? t.assignees : t.asignado_a;
                } else {
                    document.getElementById('btnRequestDelete').style.display = 'block';
                    if (t.completado) document.getElementById('btnRequestUnmark').style.display = 'block';
                }

                // Acciones de Base de Datos
                btnComplete.onclick = () => updateDoc(doc(db, "proyectos", id), { completado: true, progreso: 100, estado: 'Entregado' });
                
                document.getElementById('btnRequestDelete').onclick = () => {
                    updateDoc(doc(db, "proyectos", id), { solicitud_eliminacion: true });
                    alert("Solicitud de borrado enviada a Diego.");
                };

                document.getElementById('btnRequestUnmark').onclick = () => {
                    updateDoc(doc(db, "proyectos", id), { solicitud_desmarcar: true });
                    alert("Solicitud para reabrir tarea enviada.");
                };

                // Acciones Admin
                document.getElementById('btnAdminDelete').onclick = () => { if(confirm("¿Borrar definitivamente?")) deleteDoc(doc(db, "proyectos", id)); };
                document.getElementById('btnAdminUnmark').onclick = () => updateDoc(doc(db, "proyectos", id), { completado: false, solicitud_desmarcar: false, progreso: 90 });
                document.getElementById('btnUpdateTeam').onclick = () => {
                    const newList = document.getElementById('newAssignees').value.split(',').map(e => e.trim().toLowerCase());
                    updateDoc(doc(db, "proyectos", id), { asignado_a: newList });
                    alert("Equipo reasignado.");
                };
            });
        }

        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.href = 'index.html');
    </script>
</body>
</html>

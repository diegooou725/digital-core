<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Técnica | Digital Core</title>
    <link rel="icon" href="Isotipo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --neon-blue: #009ce1; --dark-blue: #0f172a; --light-blue: #38bdf8; }
        body { display: flex; background: #f0f4f8; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; height: 100vh; background: var(--dark-blue); color: white; position: fixed; padding: 2rem 1rem; display: flex; flex-direction: column; z-index: 100; box-sizing: border-box;}
        .sidebar-logo { width: 70%; max-width: 180px; margin: 0 auto 2rem auto; display: block; }
        .nav-links { list-style: none; padding: 0; margin: 0; } 
        .nav-links a { display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 1rem; border-radius: 8px; font-weight: 600; transition: 0.3s; margin-bottom: 5px;}
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 156, 225, 0.2); color: var(--neon-blue); }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 2rem 3rem; box-sizing: border-box; }
        
        .detail-card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 900px; margin: auto; }
        .status-pill { padding: 8px 20px; border-radius: 50px; font-size: 0.85rem; font-weight: 800; display: inline-block; margin-bottom: 1.5rem; }
        .completed { background: #c6f6d5; color: #22543d; } .pending { background: #feebc8; color: #744210; } .active-state { background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8; }
        
        .btn-action { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; transition: 0.2s; width: 100%;}
        .btn-action:hover { opacity: 0.9; }
        .btn-secondary { background: #edf2f7; color: #4a5568; border: 1px dashed #cbd5e0; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 15px; transition: 0.3s; }
        .btn-secondary:hover { background: #e2e8f0; }
        
        .btn-control { background: #edf2f7; border: none; border-radius: 8px; font-size: 1.5rem; font-weight: 900; color: var(--dark-blue); width: 50px; height: 40px; cursor: pointer; transition: 0.2s; }
        .btn-control:hover:not(:disabled) { background: #e2e8f0; }
        .btn-control:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .history-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .history-item { font-size: 0.85rem; color: #4a5568; padding: 12px 0; border-bottom: 1px dashed #cbd5e0; display: flex; flex-direction: column; gap: 5px; }
        .form-control { padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; font-family: inherit; width: 100%; box-sizing: border-box; }
        
        .admin-panel { background: #fff5f5; border: 2px dashed #feb2b2; padding: 20px; border-radius: 12px; margin-top: 30px; }
        .collab-panel { background: #f7fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-top: 30px; }
        .user-chip { background: var(--dark-blue); color: white; padding: 6px 15px; border-radius: 50px; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; }
        .user-chip i { cursor: pointer; font-size: 1.2rem; background: rgba(255,255,255,0.2); border-radius: 50%; padding: 2px; transition: 0.2s; }
        .user-chip i:hover { background: #e53e3e; }

        @media (max-width: 768px) {
            html, body { overflow-x: hidden; width: 100vw; margin: 0; padding: 0; }
            body { display: block; padding-bottom: 90px; } 
            .sidebar { 
                width: 100vw; height: 70px; position: fixed; bottom: 0; left: 0; top: auto; display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 0 5px; box-sizing: border-box; z-index: 9999; border-top: 1px solid #1e293b; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0; background: var(--dark-blue);
            }
            .sidebar-logo { display: none; }
            .nav-links { display: flex; flex-direction: row; justify-content: space-around; width: 80%; padding: 0; margin: 0; }
            .nav-links li { display: flex; justify-content: center; align-items: center; width: 100%; }
            .nav-links a { flex-direction: column; justify-content: center; align-items: center; padding: 5px 0; gap: 4px; width: 100%; margin: 0;}
            #logoutBtn { width: 20%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px 0; gap: 4px; margin: 0; }
            .nav-links a i, #logoutBtn i { font-size: 1.6rem; margin: 0; }
            .nav-links a span, #logoutBtn span { font-size: 0.65rem; display: block; font-weight: 800; margin: 0; text-align: center; }
            
            .main-content { margin-left: 0; width: 100vw; padding: 1.5rem 1rem; box-sizing: border-box; }
            .detail-card { width: 100%; box-sizing: border-box; padding: 1.5rem; }
            div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; gap: 10px !important; }
            #progressControlBox > div:first-of-type { flex-direction: column; gap: 10px; width: 100%; }
            .btn-control { width: 100%; height: 50px; font-size: 2rem; border-radius: 12px;}
            #uiProgressBar { border-radius: 10px; }
            #equipoActualChips { flex-direction: column; width: 100%; align-items: center;}
            .user-chip { width: 100%; justify-content: space-between; padding: 12px 20px; box-sizing: border-box; font-size: 1rem;}
            h1, h2 { text-align: center; word-wrap: break-word; font-size: 1.8rem !important; line-height: 1.2; margin-bottom: 10px;}
            .btn-action, .btn-secondary { width: 100%; justify-content: center; padding: 15px; font-size: 1rem; box-sizing: border-box; }
        }
        @media (max-width: 480px) {
            .nav-links a span, #logoutBtn span { display: none; }
            .nav-links a i, #logoutBtn i { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <img src="DigitalCore-blanco.png" alt="Digital Core" class="sidebar-logo">
        <ul class="nav-links">
            <li><a href="panel-control.html"><i class='bx bxs-dashboard'></i> <span>Dashboard</span></a></li>
            <li><a href="mis-trabajos.html"><i class='bx bxs-briefcase'></i> <span>Mis Trabajos</span></a></li>
            <li id="navColaboradores" style="display: none;"><a href="colaboradores.html"><i class='bx bxs-group'></i> <span>Equipo</span></a></li>
            <li><a href="catalogo.html"><i class='bx bxs-package'></i> <span>Catálogo</span></a></li>
        </ul>
        <button id="logoutBtn" style="background:none; border:none; color:#ff6b6b; cursor:pointer; margin-top: auto; font-weight:600; display:flex; gap:10px;"><i class='bx bx-log-out'></i> <span>Salir</span></button>
    </aside>

    <main class="main-content">
        <div id="loader" style="text-align: center; padding: 5rem;"><i class='bx bx-loader-alt bx-spin' style="font-size: 3rem; color: var(--neon-blue);"></i><p id="loaderStatus" style="color: #666; font-weight: 600;">Cargando expediente...</p></div>
        
        <div id="taskDetail" class="detail-card" style="display: none;">
            <div id="statusBadge" class="status-pill"></div>
            <h1 id="tProduct" style="color: var(--dark-blue); font-weight: 900; font-size: 2.2rem; margin: 0;"></h1>
            <p id="tCategory" style="color: var(--neon-blue); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;"></p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f8fafc; padding: 20px; border-radius: 12px; margin: 20px 0; border: 1px solid #e2e8f0;">
                <div><small style="color:#718096; font-weight:800;">LÍMITE DE ENTREGA:</small><br><b id="tDeadline" style="color:#c53030; font-size:1.1rem;"></b></div>
                <div><small style="color:#718096; font-weight:800;">CLIENTE:</small><br><b id="tClient" style="font-size:1.1rem;"></b></div>
                <div style="grid-column: 1 / -1;"><small style="color:#718096; font-weight:800;">EQUIPO ASIGNADO:</small><br><b id="tAssignees" style="color: var(--dark-blue);"></b></div>
            </div>

            <div style="background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0;">
                <h4 style="margin-top:0; color:var(--dark-blue);"><i class='bx bx-file'></i> Requerimientos y Enlaces</h4>
                <p id="tRequerimientos" style="color: #4a5568; font-size: 0.95rem; white-space: pre-wrap; margin-bottom: 0; line-height: 1.6; word-break: break-all;"></p>
            </div>

            <div id="actionStartBox" style="margin-bottom: 20px; display: none;">
                <button onclick="iniciarTarea()" id="btnStartTask" class="btn-action" style="background: var(--neon-blue); color: white; padding: 18px; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0, 156, 225, 0.3);"><i class='bx bx-play-circle' style="font-size: 1.5rem;"></i> COMENZAR A TRABAJAR (INICIAR SPRINT)</button>
                <button onclick="pausarTarea()" id="btnPauseTask" class="btn-action" style="background: #e2e8f0; color: var(--dark-blue); display:none;"><i class='bx bx-pause-circle'></i> PAUSAR TAREA</button>
            </div>

            <div id="progressControlBox" style="border: 2px solid var(--neon-blue); padding: 20px; border-radius: 12px; margin-bottom: 20px; background: #f0f9ff; display: none;">
                <h3 style="margin-top:0; color:var(--dark-blue);"><i class='bx bx-slider-alt'></i> Registrar Avance Diario (+10%)</h3>
                
                <div style="display:flex; align-items:center; gap:15px; margin-bottom: 15px;">
                    <button onclick="decrementarUi()" class="btn-control">-</button>
                    <div style="background: #edf2f7; width: 100%; height: 25px; border-radius: 50px; position: relative; overflow: hidden; border: 1px solid #bee3f8;"><div id="uiProgressBar" style="background: linear-gradient(90deg, var(--light-blue), var(--neon-blue)); height: 100%; transition: 0.3s; width: 0%;"></div><span id="uiProgressText" style="position: absolute; width: 100%; text-align: center; top: 0; font-weight: 900; font-size: 0.85rem; line-height: 25px; color: var(--dark-blue);">0%</span></div>
                    <button onclick="incrementarUi()" class="btn-control">+</button>
                </div>
                
                <textarea id="txtComentario" class="form-control" rows="2" placeholder="Describe qué lograste hoy y pega aquí tus links de Drive o GitHub..." style="margin-bottom: 15px;"></textarea>

                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="guardarAvance()" class="btn-action" style="background: var(--dark-blue); color:white;"><i class='bx bx-save'></i> Guardar Avance</button>
                    <button onclick="entregarTarea()" class="btn-action" style="background: #38a169; color: white;"><i class='bx bx-check-double'></i> Entregar (100%)</button>
                </div>
            </div>

            <div class="history-box">
                <h4 style="margin-top:0; border-bottom:2px solid #e2e8f0; padding-bottom:5px; color:var(--dark-blue);"><i class='bx bx-history'></i> Historial de Avances</h4>
                <div id="historyList"></div>
            </div>

            <div id="collabRequests" class="collab-panel" style="display:none;">
                <h3 style="margin-top:0; color: #4a5568;"><i class='bx bx-support'></i> Opciones de Colaborador</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="pedirReabrir()" class="btn-action" style="background: white; border: 1px solid #cbd5e0; color: #4a5568;"><i class='bx bx-undo'></i> Pedir Reabrir Tarea</button>
                    <button onclick="pedirDesasignacion()" class="btn-action" style="background: #fff5f5; border: 1px solid #feb2b2; color: #c53030;"><i class='bx bx-user-x'></i> Pedir Desasignación</button>
                </div>
            </div>

            <div id="adminPanel" class="admin-panel" style="display: none;">
                <h3 style="margin-top:0; color: #c53030;"><i class='bx bxs-crown'></i> Panel de Lead Engineer</h3>
                
                <div style="background: white; padding: 20px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #fed7d7;">
                    <label style="font-size: 0.85rem; font-weight: 800; color: #4a5568;"><i class='bx bx-group'></i> GESTIONAR EQUIPO:</label>
                    <div id="equipoActualChips" style="display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0;"></div>
                    <div id="nuevosAsignadosContainer" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px;"></div>
                    <button onclick="agregarSelectorEquipo()" class="btn-secondary"><i class='bx bx-user-plus'></i> Asignar a otro colaborador</button>
                    <button onclick="actualizarEquipo()" class="btn-action" style="background: var(--dark-blue); color: white;"><i class='bx bx-check-circle'></i> Guardar Nuevo Equipo</button>
                </div>
                
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="forzarApertura()" class="btn-action" style="background: white; border: 1px solid #cbd5e0; color: #4a5568;"><i class='bx bx-reset'></i> Forzar Apertura (Baja a 90%)</button>
                    <button onclick="eliminarTareaAdmin()" class="btn-action" style="background: #c53030; color: white;"><i class='bx bx-trash'></i> Eliminar Definitivamente</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        // IMPORTAMOS FIRESTORE (SIN STORAGE)
        import { getFirestore, doc, collection, onSnapshot, query, where, updateDoc, deleteDoc, addDoc, serverTimestamp, arrayUnion, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ", authDomain: "digital-core-app.firebaseapp.com", projectId: "digital-core-app", storageBucket: "digital-core-app.firebasestorage.app", messagingSenderId: "1003292240722", appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b" };
        const app = initializeApp(firebaseConfig); 
        const auth = getAuth(app); 
        const db = getFirestore(app);

        // GLOBALES (Vital para que el HTML reconozca las funciones de Firebase)
        window.firebaseArrayUnion = arrayUnion;
        window.firebaseServerTimestamp = serverTimestamp;

        const taskId = new URLSearchParams(window.location.search).get('id');
        let dbProgreso = 0; let uiProgreso = 0; let currentUserEmail = ""; let currentUserName = "Colaborador"; let esAdminGlobal = false;
        let opcionesEquipoHTML = '<option value="">Selecciona un colaborador...</option>'; let asignadosActualesDB = [];

        // RENDER DE EQUIPO
        async function prepararEquipo() {
            onSnapshot(collection(db, "usuarios"), (snap) => {
                opcionesEquipoHTML = '<option value="">Selecciona un colaborador...</option>';
                snap.forEach(d => { const u = d.data(); opcionesEquipoHTML += `<option value="${u.correo.toLowerCase()}">${u.nombre} (${u.rol})</option>`; });
            });
        }

        window.quitarColaborador = function(correoABorrar) { 
            asignadosActualesDB = asignadosActualesDB.filter(c => c !== correoABorrar); 
            renderizarChips(); 
        };
        
        function renderizarChips() {
            const box = document.getElementById('equipoActualChips'); box.innerHTML = '';
            if(asignadosActualesDB.length === 0) box.innerHTML = '<span style="color:#e53e3e; font-size:0.85rem; font-weight:bold;">¡La tarea quedará sin responsables!</span>';
            asignadosActualesDB.forEach(correo => { box.innerHTML += `<div class="user-chip">${correo.split('@')[0]} <i class='bx bx-x' onclick="quitarColaborador('${correo}')"></i></div>`; });
        }

        window.agregarSelectorEquipo = function() {
            const container = document.getElementById('nuevosAsignadosContainer'); 
            const nuevoSelect = document.createElement('select');
            nuevoSelect.className = 'form-control admin-collab-select'; 
            nuevoSelect.innerHTML = opcionesEquipoHTML; 
            container.appendChild(nuevoSelect);
        };

        // CARGA INICIAL
        onAuthStateChanged(auth, async (user) => {
            if (user && taskId) {
                currentUserEmail = user.email.toLowerCase().trim(); 
                esAdminGlobal = currentUserEmail === 'diego.725.reyes@gmail.com';
                
                if (esAdminGlobal) { document.getElementById('navColaboradores').style.display = 'flex'; prepararEquipo(); }
                
                try {
                    const userSnap = await getDocs(query(collection(db, "usuarios"), where("correo", "==", currentUserEmail)));
                    if (!userSnap.empty) currentUserName = userSnap.docs[0].data().nombre; else currentUserName = currentUserEmail.split('@')[0];
                } catch(e) { console.error(e); }
                
                abrirFicha(taskId);
            } else { window.location.href = 'index.html'; }
        });

        window.actualizarBarraUI = function() {
            document.getElementById('uiProgressBar').style.width = uiProgreso + "%"; 
            document.getElementById('uiProgressText').innerText = uiProgreso + "%";
        }

        function renderizarURLsTextos(texto) {
            var urlRegex = /(https?:\/\/[^\s]+)/g;
            return texto.replace(urlRegex, function(url) { return `<a href="${url}" target="_blank" style="color: var(--neon-blue); font-weight:bold; text-decoration:underline;">${url}</a>`; });
        }

        // MOTOR DE ESCUCHA (SNAPSHOT)
        function abrirFicha(id) {
            const docRef = doc(db, "proyectos", id);
            onSnapshot(docRef, (snap) => {
                if (!snap.exists()) { document.getElementById('loaderStatus').innerHTML = "<b style='color:#e53e3e'>ERROR: Tarea eliminada.</b>"; return; }
                const t = snap.data(); let arrayAsignados = Array.isArray(t.asignado_a) ? t.asignado_a : [t.asignado_a];

                // Filtro de Seguridad
                if (!esAdminGlobal && !arrayAsignados.includes(currentUserEmail)) {
                    document.getElementById('loader').style.display = 'block';
                    document.getElementById('loader').innerHTML = `<i class='bx bxs-lock-alt' style='font-size: 5rem; color: #e53e3e;'></i><h2 style='color: #e53e3e; margin-top:1rem;'>ACCESO DENEGADO</h2><p style='color: #4a5568;'>No estás asignado a este proyecto.</p><button onclick="window.location.href='panel-control.html'" class="btn-action" style="background:var(--dark-blue); color:white; width:auto; margin: 20px auto;">Volver al Dashboard</button>`;
                    document.getElementById('taskDetail').style.display = 'none'; return;
                }
                
                // Mostrar datos
                document.getElementById('loader').style.display = 'none'; document.getElementById('taskDetail').style.display = 'block';
                document.getElementById('tProduct').innerText = t.producto; document.getElementById('tCategory').innerText = t.categoria;
                document.getElementById('tClient').innerText = t.cliente; document.getElementById('tDeadline').innerText = t.entrega;
                
                let reqFinales = t.requerimientos || "Sin requerimientos especificados.";
                document.getElementById('tRequerimientos').innerHTML = renderizarURLsTextos(reqFinales);
                document.getElementById('tAssignees').innerText = arrayAsignados.join(', ');
                
                asignadosActualesDB = [...arrayAsignados]; if(esAdminGlobal) renderizarChips();
                
                dbProgreso = t.progreso || 0; uiProgreso = dbProgreso; window.actualizarBarraUI(); 
                const enProceso = t.en_proceso || false;

                // Historial
                const histList = document.getElementById('historyList');
                if (t.historial_avance && t.historial_avance.length > 0) {
                    histList.innerHTML = t.historial_avance.slice().reverse().map(h => {
                        const colorAutor = h.autor.includes("Administrador") ? "#c53030" : "var(--dark-blue)";
                        let htmlComentario = h.comentario ? `<p style="margin:5px 0 0 0; font-style:italic;">"${renderizarURLsTextos(h.comentario)}"</p>` : '';
                        return `<div class="history-item"><div style="display:flex; justify-content:space-between; align-items:center;"><span><i class='bx bx-time'></i> ${h.fecha} | <b style="color:${colorAutor};">${h.autor}</b></span><span style="background:var(--neon-blue); color:white; padding:2px 8px; border-radius:5px; font-weight:bold; font-size:0.75rem;">${h.porcentaje}%</span></div>${htmlComentario}</div>`;
                    }).join('');
                } else { histList.innerHTML = "<p style='color:#a0aec0; font-size:0.8rem;'>Aún no hay registros.</p>"; }

                // Etiquetas y Cajas Visuales
                const badge = document.getElementById('statusBadge');
                const boxStart = document.getElementById('actionStartBox'); 
                const btnStart = document.getElementById('btnStartTask'); 
                const btnPause = document.getElementById('btnPauseTask'); 
                const boxProgress = document.getElementById('progressControlBox');

                if (t.completado) { badge.innerText = "✓ TAREA COMPLETADA"; badge.className = "status-pill completed"; } else if (enProceso) { badge.innerText = "▶ EN PROCESO"; badge.className = "status-pill active-state"; } else { badge.innerText = "⟳ ASIGNADA / PENDIENTE"; badge.className = "status-pill pending"; }

                if (t.completado) { 
                    boxStart.style.display = 'none'; boxProgress.style.display = 'none'; 
                } else {
                    boxStart.style.display = 'block';
                    if (enProceso) { btnStart.style.display = 'none'; btnPause.style.display = 'flex'; boxProgress.style.display = 'block'; } 
                    else { btnStart.style.display = 'flex'; btnPause.style.display = 'none'; boxProgress.style.display = 'none'; }
                }

                if (esAdminGlobal) {
                    document.getElementById('adminPanel').style.display = 'block'; document.getElementById('collabRequests').style.display = 'none';
                    if(!t.completado) boxProgress.style.display = 'block'; 
                } else {
                    document.getElementById('adminPanel').style.display = 'none'; document.getElementById('collabRequests').style.display = 'block';
                }
            });
        }

        // =========================================================
        // FUNCIONES GLOBALES MAESTRAS (NO ESTÁN DENTRO DEL SNAPSHOT)
        // =========================================================
        
        window.iniciarTarea = async function() {
            try {
                if (!esAdminGlobal) {
                    const q = query(collection(db, "proyectos"), where("asignado_a", "array-contains", currentUserEmail), where("en_proceso", "==", true));
                    const activas = await getDocs(q);
                    if (!activas.empty && activas.docs[0].id !== taskId) { return alert(`✋ Ya tienes otra tarea iniciada. Termínala o páusala primero.`); }
                }
                const docRef = doc(db, "proyectos", taskId);
                const fechaHora = new Date().toLocaleString('es-MX');
                let nombreAutor = esAdminGlobal ? "Administrador (Diego)" : currentUserName;
                await updateDoc(docRef, { 
                    en_proceso: true, 
                    historial_avance: window.firebaseArrayUnion({ fecha: fechaHora, porcentaje: dbProgreso, comentario: esAdminGlobal ? "▶ Tarea INICIADA forzada por Administrador." : "▶ Tarea INICIADA.", autor: nombreAutor }) 
                });
            } catch(e) { alert("Error al iniciar: " + e.message); console.error(e); }
        };

        window.pausarTarea = async function() {
            try {
                const docRef = doc(db, "proyectos", taskId);
                const fechaHora = new Date().toLocaleString('es-MX');
                let nombreAutor = esAdminGlobal ? "Administrador (Diego)" : currentUserName;
                await updateDoc(docRef, { 
                    en_proceso: false, 
                    historial_avance: window.firebaseArrayUnion({ fecha: fechaHora, porcentaje: dbProgreso, comentario: esAdminGlobal ? "⏸ Tarea PAUSADA forzada por Administrador." : "⏸ Tarea PAUSADA.", autor: nombreAutor }) 
                });
            } catch(e) { alert("Error al pausar: " + e.message); console.error(e); }
        };

        window.incrementarUi = function() {
            if(uiProgreso <= 90) { uiProgreso += 10; window.actualizarBarraUI(); }
        };

        window.decrementarUi = function() {
            if (esAdminGlobal && uiProgreso >= 10) { uiProgreso -= 10; window.actualizarBarraUI(); } 
            else if (!esAdminGlobal && uiProgreso > dbProgreso) { uiProgreso -= 10; window.actualizarBarraUI(); }
        };

        window.guardarAvance = async function() {
            if (uiProgreso === dbProgreso) return alert("Modifica el progreso con el botón de (+) antes de guardar.");
            const comentario = document.getElementById('txtComentario').value.trim();
            if (uiProgreso < dbProgreso && !esAdminGlobal) return alert("Solo el administrador puede reducir el avance.");
            if (comentario === "") return alert("Debes incluir un comentario o link a Drive/GitHub para la bitácora.");

            let autorFinal = esAdminGlobal ? "Administrador (Diego)" : currentUserName; 
            let comentarioFinal = (uiProgreso < dbProgreso) ? `[Corrección Admin] ${comentario}` : comentario;

            if(confirm(`Se registrará el avance al ${uiProgreso}%. ¿Continuar?`)) {
                try {
                    const docRef = doc(db, "proyectos", taskId);
                    const fechaHora = new Date().toLocaleString('es-MX');
                    let objAvance = { fecha: fechaHora, porcentaje: uiProgreso, comentario: comentarioFinal, autor: autorFinal };

                    await updateDoc(docRef, { progreso: uiProgreso, completado: uiProgreso === 100, en_proceso: uiProgreso !== 100, historial_avance: window.firebaseArrayUnion(objAvance) });

                    if(!esAdminGlobal) { 
                        await addDoc(collection(db, "notificaciones"), { destinatario: "diego.725.reyes@gmail.com", titulo: `AVANCE REGISTRADO: ${uiProgreso}%`, mensaje: `${currentUserName.toUpperCase()} reportó progreso.`, tipo: "NUEVO", proyectoId: taskId, creado: window.firebaseServerTimestamp() }); 
                    } else { 
                        asignadosActualesDB.forEach(async (correoColab) => { 
                            if (correoColab !== currentUserEmail) { 
                                await addDoc(collection(db, "notificaciones"), { destinatario: correoColab, titulo: `AVANCE MODIFICADO`, mensaje: `Diego ajustó el progreso al ${uiProgreso}%.`, tipo: "ALERTA", proyectoId: taskId, creado: window.firebaseServerTimestamp() }); 
                            } 
                        }); 
                    }
                    document.getElementById('txtComentario').value = ""; 
                    alert("Avance guardado con éxito.");
                } catch (error) { alert("Error al guardar: " + error.message); console.error(error); }
            }
        };

        window.entregarTarea = async function() {
            const comentario = document.getElementById('txtComentario').value.trim() || "Tarea Finalizada."; let autorFinal = esAdminGlobal ? "Administrador (Diego)" : currentUserName;
            if(confirm("¿Confirmas que la tarea está al 100%?")) {
                try {
                    const docRef = doc(db, "proyectos", taskId);
                    const fechaHora = new Date().toLocaleString('es-MX');
                    await updateDoc(docRef, { completado: true, progreso: 100, en_proceso: false, historial_avance: window.firebaseArrayUnion({ fecha: fechaHora, porcentaje: 100, comentario: comentario, autor: autorFinal }) });
                    if(!esAdminGlobal) { await addDoc(collection(db, "notificaciones"), { destinatario: "diego.725.reyes@gmail.com", titulo: `¡TAREA FINALIZADA!`, mensaje: `${currentUserName.toUpperCase()} terminó el proyecto.`, tipo: "NUEVO", proyectoId: taskId, creado: window.firebaseServerTimestamp() }); }
                } catch(e) { alert("Error al finalizar."); }
            }
        };

        window.pedirReabrir = async function() { try { const docRef = doc(db, "proyectos", taskId); await updateDoc(docRef, { solicitud_desmarcar: true }); await addDoc(collection(db, "notificaciones"), { destinatario: "diego.725.reyes@gmail.com", titulo: `PETICIÓN: REABRIR TAREA`, mensaje: `Solicitud de reapertura.`, tipo: "ALERTA", proyectoId: taskId, creado: window.firebaseServerTimestamp() }); alert("Notificación enviada."); } catch (e) { alert("Error."); } };
        window.pedirDesasignacion = async function() { try { const docRef = doc(db, "proyectos", taskId); await updateDoc(docRef, { solicitud_eliminacion: true }); await addDoc(collection(db, "notificaciones"), { destinatario: "diego.725.reyes@gmail.com", titulo: `PETICIÓN: DESASIGNACIÓN`, mensaje: `Solicitud de retiro de proyecto.`, tipo: "ALERTA", proyectoId: taskId, creado: window.firebaseServerTimestamp() }); alert("Notificación enviada."); } catch (e) { alert("Error."); } };

        // FUNCIONES ADMIN MODO DIOS
        window.forzarApertura = async function() {
            if(!esAdminGlobal) return;
            try {
                const docRef = doc(db, "proyectos", taskId);
                const fechaHora = new Date().toLocaleString('es-MX');
                await updateDoc(docRef, { completado: false, solicitud_desmarcar: false, progreso: 90, en_proceso: false, historial_avance: window.firebaseArrayUnion({ fecha: fechaHora, porcentaje: 90, comentario: "Reapertura Forzada por Administrador.", autor: "Administrador (Diego)" }) });
                
                asignadosActualesDB.forEach(async (correoColab) => { 
                    if (correoColab !== currentUserEmail) { 
                        await addDoc(collection(db, "notificaciones"), { destinatario: correoColab, titulo: `¡TAREA REABIERTA!`, mensaje: `Diego ha reabierto el proyecto al 90%.`, tipo: "ALERTA", proyectoId: taskId, creado: window.firebaseServerTimestamp() }); 
                    } 
                });
                alert("Tarea reabierta al 90%.");
            } catch(e) { alert("Error al reabrir: " + e.message); console.error(e); }
        };

        window.eliminarTareaAdmin = async function() {
            if(!esAdminGlobal) return;
            if(confirm("¿Seguro que deseas ELIMINAR la tarea definitivamente de la base de datos?")) { 
                try { 
                    const docRef = doc(db, "proyectos", taskId);
                    await deleteDoc(docRef); 
                    window.location.href = 'panel-control.html'; 
                } catch(e) { alert("Error al borrar: " + e.message); console.error(e); }
            }
        };

        window.actualizarEquipo = async function() {
            if(!esAdminGlobal) return;
            try {
                const selectoresNuevos = document.querySelectorAll('.admin-collab-select'); 
                let agregados = Array.from(selectoresNuevos).map(s => s.value.toLowerCase().trim()).filter(v => v !== "");
                let equipoFinal = [...asignadosActualesDB, ...agregados]; 
                equipoFinal = [...new Set(equipoFinal)]; 
                
                if (equipoFinal.length === 0) return alert("La tarea debe tener al menos 1 asignado.");
                
                const docRef = doc(db, "proyectos", taskId);
                const fechaHora = new Date().toLocaleString('es-MX');
                
                await updateDoc(docRef, { 
                    asignado_a: equipoFinal, 
                    solicitud_eliminacion: false, 
                    historial_avance: window.firebaseArrayUnion({ fecha: fechaHora, porcentaje: dbProgreso, comentario: `Modificación de equipo. Asignados ahora: ${equipoFinal.join(', ')}`, autor: "Administrador (Diego)" }) 
                });
                
                document.getElementById('nuevosAsignadosContainer').innerHTML = ''; 
                alert("Equipo actualizado con éxito.");
            } catch(e) { alert("Error al asignar: " + e.message); console.error(e); }
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.href = 'index.html');
    </script>
</body>
</html>

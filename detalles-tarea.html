<!DOCTYPE html>
<html lang="es">
<head>
    </head>
<body>
    <main class="main-content">
        <div id="loader" style="text-align: center; padding: 5rem;">
            <i class='bx bx-loader-alt bx-spin' style="font-size: 3rem; color: var(--neon-blue);"></i>
            <p id="loaderText" style="color: #666; margin-top: 1rem;">Accediendo a la ficha técnica...</p>
        </div>
        
        <div id="taskDetail" class="detail-card" style="display: none;">
            <div id="statusBadge" class="status-pill"></div>
            <h1 id="tProduct" style="color: var(--dark-blue); font-weight: 900; font-size: 2.2rem; margin: 0;"></h1>
            <div class="action-group">
                <button id="btnMarkComplete" class="btn-action btn-complete"><i class='bx bx-check-double'></i> Finalizar Tarea</button>
                <button id="btnRequestDelete" class="btn-action btn-request" style="display:none;"><i class='bx bx-trash'></i> Solicitar Borrado</button>
            </div>

            <div id="adminPanel" class="admin-panel" style="display: none;">
                <h3 style="color: var(--dark-blue); font-weight: 900;"><i class='bx bxs-lock-open-alt'></i> Herramientas de Lead Engineer</h3>
                <div class="action-group">
                    <button id="btnAdminDelete" class="btn-action btn-delete"><i class='bx bxs-trash-alt'></i> Eliminar Definitivamente</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ",
            authDomain: "digital-core-app.firebaseapp.com",
            projectId: "digital-core-app",
            storageBucket: "digital-core-app.firebasestorage.app",
            messagingSenderId: "1003292240722",
            appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(auth);
        const db = getFirestore(app);

        // EXTRAER EL ID DE LA URL
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('id');

        onAuthStateChanged(auth, (user) => {
            if (user && taskId) {
                const isAdmin = user.email.toLowerCase().trim() === 'diego.725.reyes@gmail.com';
                abrirFicha(taskId, isAdmin);
            } else if (!taskId) {
                document.getElementById('loaderText').innerText = "ERROR: No se encontró el ID de la tarea en la URL.";
            } else {
                window.location.href = 'intranet.html';
            }
        });

        function abrirFicha(id, isAdmin) {
            // Referencia al documento en la colección 'proyectos'
            const docRef = doc(db, "proyectos", id);

            onSnapshot(docRef, (snap) => {
                if (!snap.exists()) {
                    document.getElementById('loaderText').innerText = "ERROR: La tarea no existe o fue eliminada.";
                    return;
                }
                
                const t = snap.data();
                
                // OCULTAR LOADER Y MOSTRAR FICHA
                document.getElementById('loader').style.display = 'none';
                document.getElementById('taskDetail').style.display = 'block';

                // LLENAR LOS DATOS
                document.getElementById('tProduct').innerText = t.producto;
                document.getElementById('tClient').innerText = t.cliente;
                document.getElementById('tDeadline').innerText = t.entrega;
                document.getElementById('tProgress').innerText = t.progreso || 0;
                document.getElementById('tAssignees').innerText = t.asignado_a;

                // MOSTRAR PANEL DE LÍDER SI ES DIEGO
                if (isAdmin) {
                    document.getElementById('adminPanel').style.display = 'block';
                } else {
                    document.getElementById('btnRequestDelete').style.display = 'block';
                }
            }, (error) => {
                // ESTO TE DIRÁ POR QUÉ SE QUEDA CARGANDO
                console.error("Error en Firestore:", error);
                document.getElementById('loaderText').innerHTML = `<span style="color:red">ERROR DE ACCESO:</span> Revisa tus Reglas de Seguridad en Firebase.`;
            });
        }
    </script>
</body>
</html>

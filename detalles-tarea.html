<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Técnica | Digital Core</title>
    <link rel="icon" href="Isotipo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --neon-blue: #009ce1; --dark-blue: #0f172a; --light-blue: #38bdf8; }
        body { display: flex; background: #f0f4f8; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; height: 100vh; background: var(--dark-blue); color: white; position: fixed; padding: 2rem 1rem; display: flex; flex-direction: column; z-index: 100; box-sizing: border-box;}
        .nav-links { list-style: none; padding: 0; margin: 0; } 
        .nav-links a { display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 1rem; border-radius: 8px; font-weight: 600; transition: 0.3s; margin-bottom: 5px;}
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 156, 225, 0.2); color: var(--neon-blue); }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 2rem 3rem; box-sizing: border-box; }
        
        .detail-card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 900px; margin: auto; }
        .status-pill { padding: 8px 20px; border-radius: 50px; font-size: 0.85rem; font-weight: 800; display: inline-block; margin-bottom: 1.5rem; }
        .completed { background: #c6f6d5; color: #22543d; } .pending { background: #feebc8; color: #744210; }
        
        .btn-action { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; transition: 0.2s; width: 100%;}
        .btn-action:hover { opacity: 0.9; }
        
        .btn-control { background: #edf2f7; border: none; border-radius: 8px; font-size: 1.5rem; font-weight: 900; color: var(--dark-blue); width: 50px; height: 40px; cursor: pointer; transition: 0.2s; }
        .btn-control:hover:not(:disabled) { background: #e2e8f0; }
        .btn-control:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .history-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .history-item { font-size: 0.85rem; color: #4a5568; padding: 12px 0; border-bottom: 1px dashed #cbd5e0; display: flex; flex-direction: column; gap: 5px; }
        .form-control { padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; font-family: inherit; width: 100%; box-sizing: border-box; }
        
        .admin-panel { background: #fff5f5; border: 2px dashed #feb2b2; padding: 20px; border-radius: 12px; margin-top: 30px; }
        .collab-panel { background: #f7fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-top: 30px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2 style="padding-left: 1rem; color: var(--light-blue); margin-bottom: 2rem;">Digital Core</h2>
        <ul class="nav-links">
            <li><a href="panel-control.html"><i class='bx bxs-dashboard'></i> Dashboard</a></li>
            <li><a href="mis-trabajos.html"><i class='bx bxs-briefcase'></i> Mis Trabajos</a></li>
            <li><a href="colaboradores.html"><i class='bx bxs-group'></i> Colaboradores</a></li>
        </ul>
        <button id="logoutBtn" style="background:none; border:none; color:#ff6b6b; cursor:pointer; margin-top: auto; font-weight:600; display:flex; gap:10px;"><i class='bx bx-log-out'></i> Salir</button>
    </aside>

    <main class="main-content">
        <div id="loader" style="text-align: center; padding: 5rem;">
            <i class='bx bx-loader-alt bx-spin' style="font-size: 3rem; color: var(--neon-blue);"></i>
            <p id="loaderStatus" style="color: #666; font-weight: 600;">Conectando con la Bóveda...</p>
        </div>
        
        <div id="taskDetail" class="detail-card" style="display: none;">
            <div id="statusBadge" class="status-pill"></div>
            <h1 id="tProduct" style="color: var(--dark-blue); font-weight: 900; font-size: 2.2rem; margin: 0;"></h1>
            <p id="tCategory" style="color: var(--neon-blue); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;"></p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f8fafc; padding: 20px; border-radius: 12px; margin: 20px 0; border: 1px solid #e2e8f0;">
                <div><small style="color:#718096; font-weight:800;">LÍMITE DE ENTREGA:</small><br><b id="tDeadline" style="color:#c53030; font-size:1.1rem;"></b></div>
                <div><small style="color:#718096; font-weight:800;">CLIENTE:</small><br><b id="tClient" style="font-size:1.1rem;"></b></div>
                <div style="grid-column: 1 / -1;"><small style="color:#718096; font-weight:800;">EQUIPO ASIGNADO:</small><br><b id="tAssignees" style="color: var(--dark-blue);"></b></div>
            </div>

            <div id="progressControlBox" style="border: 2px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                <h3 style="margin-top:0; color:var(--dark-blue);"><i class='bx bx-slider-alt'></i> Panel de Avance</h3>
                
                <div style="display:flex; align-items:center; gap:15px; margin-bottom: 15px;">
                    <button id="btnMinus" class="btn-control">-</button>
                    <div style="background: #edf2f7; width: 100%; height: 25px; border-radius: 50px; position: relative; overflow: hidden;">
                        <div id="uiProgressBar" style="background: linear-gradient(90deg, var(--light-blue), var(--neon-blue)); height: 100%; transition: 0.3s; width: 0%;"></div>
                        <span id="uiProgressText" style="position: absolute; width: 100%; text-align: center; top: 0; font-weight: 900; font-size: 0.85rem; line-height: 25px; color: var(--dark-blue); text-shadow: 1px 1px 2px rgba(255,255,255,0.8);">0%</span>
                    </div>
                    <button id="btnPlus" class="btn-control">+</button>
                </div>
                
                <textarea id="txtComentario" class="form-control" rows="2" placeholder="Comentario obligatorio para la bitácora..." style="margin-bottom: 10px;"></textarea>
                
                <div style="display: flex; gap: 10px;">
                    <button id="btnConfirmProgress" class="btn-action" style="background: var(--dark-blue); color:white;"><i class='bx bx-save'></i> Registrar Avance</button>
                    <button id="btnMarkComplete" class="btn-action" style="background: #38a169; color: white;"><i class='bx bx-check-double'></i> Tarea Completada (100%)</button>
                </div>
                <small id="progressWarning" style="color: #a0aec0; display: block; margin-top: 10px; text-align: center;">El progreso no puede retroceder.</small>
            </div>

            <div class="history-box">
                <h4 style="margin-top:0; border-bottom:2px solid #e2e8f0; padding-bottom:5px; color:var(--dark-blue);"><i class='bx bx-history'></i> Bitácora del Proyecto</h4>
                <div id="historyList"></div>
            </div>

            <div id="collabRequests" class="collab-panel" style="display:none;">
                <h3 style="margin-top:0; color: #4a5568;"><i class='bx bx-support'></i> Opciones de Colaborador</h3>
                <div style="display: flex; gap: 10px;">
                    <button id="btnRequestUnmark" class="btn-action" style="background: white; border: 1px solid #cbd5e0; color: #4a5568;"><i class='bx bx-undo'></i> Pedir Reabrir Tarea</button>
                    <button id="btnRequestRemove" class="btn-action" style="background: #fff5f5; border: 1px solid #feb2b2; color: #c53030;"><i class='bx bx-user-x'></i> Pedir Desasignación</button>
                </div>
            </div>

            <div id="adminPanel" class="admin-panel" style="display: none;">
                <h3 style="margin-top:0; color: #c53030;"><i class='bx bxs-crown'></i> Panel de Lead Engineer</h3>
                
                <div style="background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <label style="font-size: 0.85rem; font-weight: 800; color: #4a5568;">MODIFICAR EQUIPO (Separa con comas):</label>
                    <input type="text" id="adminAssignees" class="form-control" style="margin: 10px 0;">
                    <button id="btnUpdateAssignees" class="btn-action" style="background: var(--dark-blue); color: white;"><i class='bx bx-refresh'></i> Reasignar Colaboradores</button>
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <button id="btnAdminUnmark" class="btn-action" style="background: white; border: 1px solid #cbd5e0; color: #4a5568;"><i class='bx bx-reset'></i> Forzar Apertura (Baja a 90%)</button>
                    <button id="btnAdminDelete" class="btn-action" style="background: #c53030; color: white;"><i class='bx bx-trash'></i> Eliminar Tarea</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ", authDomain: "digital-core-app.firebaseapp.com", projectId: "digital-core-app", storageBucket: "digital-core-app.firebasestorage.app", messagingSenderId: "1003292240722", appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const taskId = new URLSearchParams(window.location.search).get('id');
        let dbProgreso = 0; 
        let uiProgreso = 0;
        let currentUserEmail = "";
        let esAdminGlobal = false;

        onAuthStateChanged(auth, (user) => {
            if (user && taskId) {
                currentUserEmail = user.email.toLowerCase().trim();
                esAdminGlobal = currentUserEmail === 'diego.725.reyes@gmail.com';
                abrirFicha(taskId);
            } else { window.location.href = 'intranet.html'; }
        });

        function actualizarBarraUI() {
            document.getElementById('uiProgressBar').style.width = uiProgreso + "%";
            document.getElementById('uiProgressText').innerText = uiProgreso + "%";
            document.getElementById('btnPlus').disabled = uiProgreso >= 100;
            
            // Si es admin, puede bajar todo lo que quiera (hasta 0). Si es colaborador, no puede bajar de dbProgreso.
            if (esAdminGlobal) {
                document.getElementById('btnMinus').disabled = uiProgreso <= 0;
            } else {
                document.getElementById('btnMinus').disabled = uiProgreso <= dbProgreso;
            }
        }

        function abrirFicha(id) {
            const docRef = doc(db, "proyectos", id);
            
            onSnapshot(docRef, (snap) => {
                if (!snap.exists()) {
                    document.getElementById('loaderStatus').innerHTML = "<b style='color:#e53e3e'>ERROR:</b> La tarea no existe.";
                    return;
                }
                const t = snap.data();
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('taskDetail').style.display = 'block';

                document.getElementById('tProduct').innerText = t.producto;
                document.getElementById('tCategory').innerText = t.categoria;
                document.getElementById('tClient').innerText = t.cliente;
                document.getElementById('tDeadline').innerText = t.entrega;
                
                let asignadosTexto = Array.isArray(t.asignado_a) ? t.asignado_a.join(', ') : t.asignado_a;
                document.getElementById('tAssignees').innerText = asignadosTexto;
                
                dbProgreso = t.progreso || 0;
                uiProgreso = dbProgreso; 
                actualizarBarraUI();

                // PINTAR HISTORIAL
                const histList = document.getElementById('historyList');
                if (t.historial_avance && t.historial_avance.length > 0) {
                    histList.innerHTML = t.historial_avance.slice().reverse().map(h => {
                        // Si el autor contiene la palabra "Administrador", lo pintamos rojo para destacar su autoridad
                        const colorAutor = h.autor.includes("Administrador") ? "#c53030" : "var(--dark-blue)";
                        return `
                        <div class="history-item">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span><i class='bx bx-time'></i> ${h.fecha} | <b style="color:${colorAutor};">${h.autor}</b></span>
                                <span style="background:var(--neon-blue); color:white; padding:2px 8px; border-radius:5px; font-weight:bold; font-size:0.75rem;">${h.porcentaje}%</span>
                            </div>
                            ${h.comentario ? `<p style="margin:5px 0 0 0; font-style:italic;">"${h.comentario}"</p>` : ''}
                        </div>`;
                    }).join('');
                } else {
                    histList.innerHTML = "<p style='color:#a0aec0; font-size:0.8rem;'>Aún no hay registros de actividad.</p>";
                }

                // ESTADOS
                const badge = document.getElementById('statusBadge');
                badge.innerText = t.completado ? "✓ TAREA COMPLETADA" : "⟳ TAREA EN CURSO";
                badge.className = `status-pill ${t.completado ? 'completed' : 'pending'}`;

                // ==========================================
                // LÓGICA IMPLACABLE DE PANELES (ADMIN VS COLLAB)
                // ==========================================
                
                if (esAdminGlobal) {
                    // EL ADMIN VE TODO
                    document.getElementById('adminPanel').style.display = 'block';
                    document.getElementById('collabRequests').style.display = 'none';
                    document.getElementById('adminAssignees').value = asignadosTexto;
                    document.getElementById('progressControlBox').style.display = 'block'; // Admin siempre puede editar progreso
                    document.getElementById('btnMarkComplete').style.display = t.completado ? 'none' : 'block';
                    document.getElementById('progressWarning').innerText = "Modo Dios: Puedes aumentar o reducir el progreso a voluntad.";
                } else {
                    // EL COLABORADOR ESTÁ RESTRINGIDO
                    document.getElementById('adminPanel').style.display = 'none';
                    document.getElementById('collabRequests').style.display = 'block';
                    document.getElementById('progressWarning').innerText = "El progreso no puede retroceder una vez confirmado.";
                    
                    if (t.completado) {
                        document.getElementById('progressControlBox').style.display = 'none';
                        document.getElementById('btnRequestUnmark').style.display = 'block';
                        document.getElementById('btnRequestRemove').style.display = 'none';
                    } else {
                        document.getElementById('progressControlBox').style.display = 'block';
                        document.getElementById('btnRequestUnmark').style.display = 'none';
                        document.getElementById('btnRequestRemove').style.display = 'block';
                    }
                }

                // ==========================================
                // EVENTOS DE BOTONES
                // ==========================================
                
                document.getElementById('btnPlus').onclick = () => { if(uiProgreso <= 90) { uiProgreso += 10; actualizarBarraUI(); } };
                document.getElementById('btnMinus').onclick = () => { 
                    if (esAdminGlobal && uiProgreso >= 10) { uiProgreso -= 10; actualizarBarraUI(); }
                    else if (!esAdminGlobal && uiProgreso > dbProgreso) { uiProgreso -= 10; actualizarBarraUI(); }
                };

                // GUARDAR AVANCE
                document.getElementById('btnConfirmProgress').onclick = async () => {
                    if (uiProgreso === dbProgreso) return alert("Modifica el progreso con los botones antes de guardar.");
                    const comentario = document.getElementById('txtComentario').value.trim();
                    
                    let esReduccion = uiProgreso < dbProgreso;
                    if (esReduccion && !esAdminGlobal) return alert("Solo el administrador puede reducir el avance.");
                    if (comentario === "") return alert("La bitácora exige un comentario describiendo el cambio.");

                    let autorFinal = esAdminGlobal ? "Administrador (Diego)" : currentUserEmail.split('@')[0];
                    let comentarioFinal = esReduccion ? `[Corrección de Admin] ${comentario}` : comentario;

                    if(confirm(`Se registrará el avance al ${uiProgreso}%. ¿Continuar?`)) {
                        const fechaHora = new Date().toLocaleString('es-MX');
                        await updateDoc(docRef, {
                            progreso: uiProgreso,
                            completado: uiProgreso === 100,
                            historial_avance: arrayUnion({ fecha: fechaHora, porcentaje: uiProgreso, comentario: comentarioFinal, autor: autorFinal }),
                            notificar_admin: !esAdminGlobal // Avisar a Diego solo si lo hizo un colaborador
                        });
                        document.getElementById('txtComentario').value = ""; 
                    }
                };

                document.getElementById('btnMarkComplete').onclick = async () => {
                    const comentario = document.getElementById('txtComentario').value.trim() || "Tarea Finalizada.";
                    let autorFinal = esAdminGlobal ? "Administrador (Diego)" : currentUserEmail.split('@')[0];
                    if(confirm("¿Confirmas que la tarea está al 100%?")) {
                        const fechaHora = new Date().toLocaleString('es-MX');
                        await updateDoc(docRef, { 
                            completado: true, progreso: 100, 
                            historial_avance: arrayUnion({ fecha: fechaHora, porcentaje: 100, comentario: comentario, autor: autorFinal }),
                            notificar_admin: !esAdminGlobal
                        });
                    }
                };

                // SOLICITUDES COLABORADOR
                document.getElementById('btnRequestUnmark').onclick = async () => { 
                    await updateDoc(docRef, { solicitud_desmarcar: true, notificar_admin: true }); 
                    alert("Se ha notificado a Diego para que reabra la tarea."); 
                };
                document.getElementById('btnRequestRemove').onclick = async () => { 
                    await updateDoc(docRef, { solicitud_eliminacion: true, notificar_admin: true }); 
                    alert("Se ha notificado a Diego para que te retire de la tarea."); 
                };

                // ACCIONES EXCLUSIVAS DEL LEAD ENGINEER
                if(esAdminGlobal) {
                    // Forzar Apertura (Baja a 90% y deja rastro)
                    document.getElementById('btnAdminUnmark').onclick = async () => {
                        const fechaHora = new Date().toLocaleString('es-MX');
                        await updateDoc(docRef, { 
                            completado: false, 
                            solicitud_desmarcar: false, 
                            notificar_admin: false,
                            progreso: 90,
                            historial_avance: arrayUnion({ fecha: fechaHora, porcentaje: 90, comentario: "Reapertura Forzada: Se restó 10% para correcciones.", autor: "Administrador (Diego)" })
                        });
                        alert("Tarea reabierta. El progreso se ajustó al 90%.");
                    };
                    
                    document.getElementById('btnAdminDelete').onclick = async () => { 
                        if(confirm("ESTO ES IRREVERSIBLE. ¿Eliminar tarea del sistema?")) {
                            await deleteDoc(docRef);
                            window.location.href = 'panel-control.html';
                        }
                    };
                    
                    document.getElementById('btnUpdateAssignees').onclick = async () => {
                        const listaCorreos = document.getElementById('adminAssignees').value.split(',').map(e => e.trim().toLowerCase()).filter(e => e !== "");
                        const fechaHora = new Date().toLocaleString('es-MX');
                        await updateDoc(docRef, { 
                            asignado_a: listaCorreos,
                            solicitud_eliminacion: false, 
                            notificar_admin: false,
                            historial_avance: arrayUnion({ fecha: fechaHora, porcentaje: dbProgreso, comentario: `Cambio de equipo. Nuevos asignados: ${listaCorreos.join(', ')}`, autor: "Administrador (Diego)" })
                        });
                        alert("Equipo reasignado y guardado en la bitácora.");
                    };
                }
            });
        }
        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.href = 'index.html');
    </script>
</body>
</html>

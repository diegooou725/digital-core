<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Trabajos | Digital Core</title>
    <link rel="icon" href="Isotipo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* ESTILOS MAESTROS UNIFICADOS (Igual al Dashboard) */
        :root { --sidebar-width: 260px; --dark-blue: #0f172a; --neon-blue: #009ce1; --light-blue: #38bdf8; }
        body { display: flex; background: #f0f4f8; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        
        /* SIDEBAR */
        .sidebar { width: var(--sidebar-width); height: 100vh; background: var(--dark-blue); color: white; position: fixed; padding: 2rem 1rem; display: flex; flex-direction: column; z-index: 100; box-sizing: border-box; }
        .sidebar-logo { width: 80%; margin-bottom: 3rem; padding-left: 1rem; }
        .nav-links { list-style: none; flex-grow: 1; padding: 0; margin: 0; }
        .nav-links a { display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 1rem; border-radius: 8px; transition: 0.3s; font-weight: 600; margin-bottom: 5px; }
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 156, 225, 0.2); color: var(--neon-blue); }
        
        /* CONTENIDO PRINCIPAL */
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 2rem 3rem; box-sizing: border-box; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: white; padding: 1.5rem 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* TARJETAS DE TAREAS */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .task-card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid #cbd5e0; cursor:pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        
        /* ESTADOS DE ETIQUETAS */
        .st-demorada { border-left-color: #e53e3e; } .badge-demorada { background: #fff5f5; color:#e53e3e; font-size: 0.7rem; padding: 4px 10px; border-radius: 50px; font-weight: 800; }
        .st-proceso { border-left-color: #3182ce; } .badge-proceso { background: #ebf8ff; color:#3182ce; font-size: 0.7rem; padding: 4px 10px; border-radius: 50px; font-weight: 800; }
        .st-asignada { border-left-color: #718096; } .badge-asignada { background: #f7fafc; color:#718096; font-size: 0.7rem; padding: 4px 10px; border-radius: 50px; font-weight: 800; }
        .st-completada { border-left-color: #38a169; opacity: 0.85; } .badge-completada { background: #f0fff4; color:#38a169; font-size: 0.7rem; padding: 4px 10px; border-radius: 50px; font-weight: 800; }
        
        /* ELEMENTOS EXTRA */
        .filter-badge { display: inline-block; background: var(--neon-blue); color: white; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; margin-left: 10px; text-transform: uppercase;}
        .btn-clear-filter { padding: 10px 20px; border-radius: 8px; border: 1px solid #cbd5e0; background: white; cursor: pointer; font-weight: 700; color: #4a5568; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-clear-filter:hover { background: #edf2f7; }

        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span, .sidebar-logo { display: none; } .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 1.5rem; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2 style="padding-left: 1rem; color: var(--light-blue); margin-bottom: 2rem;">Digital Core</h2>
        <ul class="nav-links">
            <li><a href="panel-control.html"><i class='bx bxs-dashboard'></i> <span>Dashboard</span></a></li>
            <li><a href="mis-trabajos.html" class="active"><i class='bx bxs-briefcase'></i> <span>Mis Trabajos</span></a></li>
            <li id="navColaboradores" style="display: none;"><a href="colaboradores.html"><i class='bx bxs-group'></i> <span>Colaboradores</span></a></li>
            <li><a href="catalogo.html"><i class='bx bxs-package'></i> <span>Catálogo</span></a></li>
        </ul>
        <button id="logoutBtn" style="background:none; border:none; color:#ff6b6b; cursor:pointer; display:flex; align-items:center; gap:15px; padding:12px 1rem; font-weight:600; margin-top: auto;">
            <i class='bx bx-log-out'></i> <span>Cerrar Sesión</span>
        </button>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1 id="userNameWelcome" style="color: var(--dark-blue); font-weight: 900; margin:0;">Iniciando...</h1>
                <p id="roleLabel" style="color: #666; margin:0; font-size: 0.9rem;">Sincronizando Historial</p>
            </div>
            <div style="background: #f8fafc; padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; border: 1px solid #edf2f7;">
                <i class='bx bxs-user-circle' style="color: var(--light-blue); font-size: 1.4rem;"></i>
                <span id="userEmailLabel" style="font-size: 0.85rem; font-weight: 600; color: var(--dark-blue);">Cargando...</span>
            </div>
        </header>

        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
            <h2 style="color: var(--dark-blue); font-weight: 900; margin: 0; display: flex; align-items: center;">
                <i class='bx bx-archive' style="margin-right: 10px;"></i> Histórico de Proyectos 
                <span id="labelFiltro" class="filter-badge" style="display:none;"></span>
            </h2>
            
            <button onclick="window.location.href='mis-trabajos.html?filtro=todas'" class="btn-clear-filter" id="btnMostrarTodas" style="display: none;">
                <i class='bx bx-filter-alt'></i> Quitar Filtros
            </button>
        </div>

        <div id="fullBoard" class="card-grid">
            <div style="text-align: center; grid-column: 1/-1; padding: 3rem;"><i class='bx bx-loader-alt bx-spin' style="font-size: 3rem; color: var(--neon-blue);"></i></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ", authDomain: "digital-core-app.firebaseapp.com", projectId: "digital-core-app", storageBucket: "digital-core-app.firebasestorage.app", messagingSenderId: "1003292240722", appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b" };
        const app = initializeApp(firebaseConfig); 
        const auth = getAuth(app); 
        const db = getFirestore(app);

        // LECTURA DEL FILTRO EN LA URL (Deep Linking)
        const urlParams = new URLSearchParams(window.location.search);
        const filtroSolicitado = urlParams.get('filtro') || 'todas';

        if(filtroSolicitado !== 'todas') {
            const lbl = document.getElementById('labelFiltro');
            lbl.style.display = 'inline-block';
            lbl.innerText = "Filtrando: " + filtroSolicitado;
            
            // Mostrar botón para limpiar filtro si hay uno activo
            document.getElementById('btnMostrarTodas').style.display = 'inline-flex';
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const email = user.email.toLowerCase().trim();
                const isAdmin = email === 'diego.725.reyes@gmail.com';
                
                // Mostrar Menú de Colaboradores si es Admin
                if (isAdmin) {
                    document.getElementById('navColaboradores').style.display = 'flex';
                }

                // Llenar datos de la barra superior
                document.getElementById('userEmailLabel').innerText = email;
                const userSnap = await getDocs(query(collection(db, "usuarios"), where("correo", "==", email)));
                if (!userSnap.empty) {
                    const u = userSnap.docs[0].data();
                    document.getElementById('userNameWelcome').innerText = isAdmin ? "Registro Global" : `Historial de ${u.nombre.split(' ')[0]}`;
                    document.getElementById('roleLabel').innerText = u.rol;
                }

                renderizarHistorico(email, isAdmin);
            } else {
                window.location.href = 'intranet.html';
            }
        });

        function renderizarHistorico(email, isAdmin) {
            // Regla de Negocio: El Admin ve todo, el colaborador ve solo lo suyo.
            const q = isAdmin ? collection(db, "proyectos") : query(collection(db, "proyectos"), where("asignado_a", "array-contains", email));
            
            onSnapshot(q, (snap) => {
                let tareas = [];
                snap.forEach(d => tareas.push({ id: d.id, ...d.data() }));

                const hoy = new Date().toISOString().split('T')[0];

                // Ordenar: Las más recientes/urgentes arriba
                tareas.sort((a, b) => new Date(b.entrega) - new Date(a.entrega));

                const container = document.getElementById('fullBoard');
                container.innerHTML = "";

                if(tareas.length === 0) {
                    container.innerHTML = `<p style="grid-column: 1/-1; color: #718096; text-align: center; padding: 2rem;">No hay proyectos registrados.</p>`;
                    return;
                }

                let proyectosMostrados = 0;

                tareas.forEach(p => {
                    // CALCULAR ESTADO REAL
                    if (p.completado) p._estadoReal = "completadas";
                    else if (p.en_proceso) p._estadoReal = "proceso";
                    else if (p.entrega < hoy) p._estadoReal = "demoradas";
                    else p._estadoReal = "asignadas";

                    // APLICAR FILTRO DE LA URL
                    if (filtroSolicitado !== 'todas' && p._estadoReal !== filtroSolicitado) {
                        return; // Salta esta iteración y no dibuja la tarjeta
                    }

                    proyectosMostrados++;

                    // ESTILOS SEMÁNTICOS
                    let claseEst = "st-asignada"; let badgeClass = "badge-asignada"; let txtEstado = "ASIGNADA";
                    if (p._estadoReal === "demoradas") { claseEst = "st-demorada"; badgeClass = "badge-demorada"; txtEstado = "DEMORADA"; }
                    else if (p._estadoReal === "proceso") { claseEst = "st-proceso"; badgeClass = "badge-proceso"; txtEstado = "EN PROCESO"; }
                    else if (p._estadoReal === "completadas") { claseEst = "st-completada"; badgeClass = "badge-completada"; txtEstado = "COMPLETADA"; }

                    // Formatear responsables para la vista
                    let responsables = Array.isArray(p.asignado_a) ? p.asignado_a[0].split('@')[0] + (p.asignado_a.length > 1 ? ' +' : '') : p.asignado_a.split('@')[0];

                    container.innerHTML += `
                        <div class="task-card ${claseEst}" onclick="window.location.href='detalles-tarea.html?id=${p.id}'">
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
                                <span class="${badgeClass}">${txtEstado}</span>
                                <span style="font-size:0.75rem; color:#a0aec0; font-weight:700;"><i class='bx bx-calendar-x'></i> ${p.entrega}</span>
                            </div>
                            <h3 style="margin:8px 0; font-size:1.1rem; color:var(--dark-blue);">${p.producto}</h3>
                            <p style="font-size:0.8rem; color:#718096; margin: 0 0 10px 0;">Cliente: <b>${p.cliente}</b></p>
                            
                            <div style="background:#edf2f7; height:8px; border-radius:10px; margin:15px 0 10px 0;">
                                <div style="width:${p.progreso}%; background: ${p.completado ? '#38a169' : 'var(--neon-blue)'}; height:100%; border-radius:10px; transition:0.5s;"></div>
                            </div>
                            
                            <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:#718096; font-weight:600;">
                                <span>Avance: ${p.progreso}%</span>
                                <span><i class='bx bx-user'></i> ${isAdmin ? responsables : 'Tú'}</span>
                            </div>
                        </div>`;
                });

                if (proyectosMostrados === 0) {
                    container.innerHTML = `<p style="grid-column: 1/-1; color: #718096; text-align: center; padding: 2rem;">No hay proyectos que coincidan con este filtro.</p>`;
                }
            });
        }
        
        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.href = 'index.html');
    </script>
</body>
</html>

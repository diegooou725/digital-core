<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Trabajos | Digital Core</title>
    </head>
<body>
    <main class="main-content" style="margin-left: 260px; padding: 2rem; font-family: 'Inter', sans-serif;">
        <h2>Histórico Completo de Trabajos</h2>
        <div id="fullBoard" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        // Misma config de Firebase...
        const firebaseConfig = { apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ", authDomain: "digital-core-app.firebaseapp.com", projectId: "digital-core-app", storageBucket: "digital-core-app.firebasestorage.app", messagingSenderId: "1003292240722", appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) renderizarTodo(user.email.toLowerCase().trim());
        });

        function renderizarTodo(email) {
            onSnapshot(query(collection(db, "proyectos"), where("asignado_a", "==", email)), (snap) => {
                let tareas = [];
                snap.forEach(d => tareas.push({ id: d.id, ...d.data() }));
                
                // Ordenar por fecha de entrega
                tareas.sort((a, b) => new Date(b.entrega) - new Date(a.entrega));

                let hayUnaEnProceso = false;
                const hoy = new Date().toISOString().split('T')[0];
                const container = document.getElementById('fullBoard');
                container.innerHTML = "";

                tareas.forEach(p => {
                    let eStr = "ASIGNADA"; let cStr = "border-left: 5px solid #718096;"; let bCol = "#718096";
                    
                    if (p.completado) { eStr = "COMPLETADA"; cStr = "border-left: 5px solid #38a169;"; bCol = "#38a169"; }
                    else if (p.entrega < hoy) { eStr = "DEMORADA"; cStr = "border-left: 5px solid #e53e3e;"; bCol = "#e53e3e"; }
                    else if (p.progreso > 0 && !hayUnaEnProceso) { eStr = "EN PROCESO"; cStr = "border-left: 5px solid #3182ce;"; bCol = "#3182ce"; hayUnaEnProceso = true; }

                    container.innerHTML += `
                        <div style="background: white; padding: 20px; border-radius: 12px; cursor:pointer; ${cStr}" onclick="window.location.href='detalles-tarea.html?id=${p.id}'">
                            <span style="font-size:0.7rem; font-weight:bold; color:${bCol};">${eStr}</span>
                            <h3 style="margin:5px 0;">${p.producto}</h3>
                            <p style="font-size:0.8rem; color:#718096;">Progreso: ${p.progreso}%</p>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>

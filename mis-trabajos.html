<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Trabajos | Digital Core</title>
    <link rel="icon" href="Isotipo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { --sidebar-width: 260px; }
        body { display: flex; background: #f0f4f8; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        
        .sidebar { width: var(--sidebar-width); height: 100vh; background: var(--dark-blue); color: white; position: fixed; padding: 2rem 1rem; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-logo { width: 80%; margin-bottom: 3rem; padding-left: 1rem; }
        .nav-links { list-style: none; flex-grow: 1; padding: 0; }
        .nav-links a { display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 1rem; border-radius: 8px; transition: 0.3s; font-weight: 600; }
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 156, 225, 0.2); color: var(--neon-blue); }
        
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 2rem 3rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: white; padding: 1.5rem 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .content-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .work-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; margin-top: 20px; }
        
        .work-card { background: #fff; border-radius: 12px; border: 1px solid #edf2f7; padding: 20px; position: relative; transition: 0.3s; border-left: 5px solid var(--neon-blue); }
        .work-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        .status-badge { position: absolute; top: 20px; right: 20px; font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 50px; text-transform: uppercase; }
        .status-urgente { background: #fff5f5; color: #c53030; }
        .status-proceso { background: #ebf8ff; color: #2b6cb0; }
        
        .progress-bar-container { height: 10px; background: #edf2f7; border-radius: 10px; margin: 20px 0 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--light-blue), var(--neon-blue)); transition: 0.5s; }
        
        .btn-update { background: #f7fafc; border: 1px solid #cbd5e0; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.8rem; }
        .btn-update:hover { background: var(--neon-blue); color: white; border-color: var(--neon-blue); }

        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span, .sidebar-logo { display: none; } .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 1.5rem; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <img src="Digital Core original.png" alt="Logo" class="sidebar-logo">
        <ul class="nav-links">
            <li><a href="panel-control.html"><i class='bx bxs-dashboard'></i> <span>Dashboard</span></a></li>
            <li><a href="mis-trabajos.html" class="active"><i class='bx bxs-briefcase'></i> <span>Mis Trabajos</span></a></li>
            <li><a href="colaboradores.html"><i class='bx bxs-group'></i> <span>Colaboradores</span></a></li>
            <li><a href="#"><i class='bx bxs-package'></i> <span>Catálogo</span></a></li>
        </ul>
        <button id="logoutBtn" style="background:none; border:none; color:#ff6b6b; cursor:pointer; display:flex; align-items:center; gap:15px; padding:12px 1rem; font-weight:600; margin-top: auto;">
            <i class='bx bx-log-out'></i> <span>Cerrar Sesión</span>
        </button>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1 style="color: var(--dark-blue); font-weight: 900; margin:0;">Mis Proyectos Asignados</h1>
                <p style="color: #666; margin:0; font-size: 0.9rem;">Gestiona tu carga de trabajo personal</p>
            </div>
            <div style="background: #f8fafc; padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; border: 1px solid #edf2f7;">
                <i class='bx bxs-user-circle' style="color: var(--light-blue); font-size: 1.4rem;"></i>
                <span id="userEmailLabel" style="font-size: 0.85rem; font-weight: 600; color: var(--dark-blue);">...</span>
            </div>
        </header>

        <section class="content-card">
            <div id="personalWorkBoard" class="work-grid">
                </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ",
            authDomain: "digital-core-app.firebaseapp.com",
            projectId: "digital-core-app",
            storageBucket: "digital-core-app.firebasestorage.app",
            messagingSenderId: "1003292240722",
            appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b",
            measurementId: "G-SX61ZVLJF0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userEmail = user.email.toLowerCase().trim();
                document.getElementById('userEmailLabel').innerText = userEmail;
                cargarMisTareas(userEmail);
            } else {
                window.location.href = 'intranet.html';
            }
        });

        function cargarMisTareas(email) {
            const q = query(collection(db, "proyectos"), where("asignado_a", "==", email));

            onSnapshot(q, (snap) => {
                const container = document.getElementById('personalWorkBoard');
                container.innerHTML = "";

                if (snap.empty) {
                    container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #888; padding: 3rem;">No tienes trabajos asignados actualmente.</p>`;
                    return;
                }

                snap.forEach((d) => {
                    const p = d.data();
                    const statusClass = p.estado === 'Urgente' ? 'status-urgente' : 'status-proceso';
                    
                    container.innerHTML += `
                        <div class="work-card">
                            <span class="status-badge ${statusClass}">${p.estado}</span>
                            <small style="color: var(--light-blue); font-weight: 800;">${p.categoria}</small>
                            <h3 style="margin: 10px 0 5px 0; color: var(--dark-blue);">${p.producto}</h3>
                            <p style="font-size: 0.85rem; color: #718096; margin: 0;">Cliente: <b>${p.cliente}</b></p>
                            
                            <div class="progress-bar-container">
                                <div class="progress-fill" style="width: ${p.progreso}%"></div>
                            </div>
                            
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-size: 0.8rem; font-weight: 800;">${p.progreso}% Completado</span>
                                <div style="display: flex; gap: 5px;">
                                    <button class="btn-update" onclick="actualizarProgreso('${d.id}', ${p.progreso}, -10)">-</button>
                                    <button class="btn-update" onclick="actualizarProgreso('${d.id}', ${p.progreso}, 10)">+</button>
                                </div>
                            </div>
                            <p style="margin-top: 15px; font-size: 0.75rem; color: #a0aec0;"><i class='bx bx-calendar'></i> Entrega: ${p.entrega}</p>
                        </div>
                    `;
                });
            });
        }

        window.actualizarProgreso = async (id, actual, cambio) => {
            let nuevoProgreso = Math.min(100, Math.max(0, actual + cambio));
            await updateDoc(doc(db, "proyectos", id), { progreso: nuevoProgreso });
        };

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => window.location.href = 'index.html'));
    </script>
</body>
</html>

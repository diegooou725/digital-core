<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Servicios | Digital Core</title>
    <link rel="icon" href="Isotipo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --sidebar-width: 260px; --dark-blue: #0f172a; --neon-blue: #009ce1; --light-blue: #38bdf8; }
        body { display: flex; background: #f0f4f8; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        
        .sidebar { width: var(--sidebar-width); height: 100vh; background: var(--dark-blue); color: white; position: fixed; padding: 2rem 1rem; display: flex; flex-direction: column; z-index: 100; box-sizing: border-box; }
        .sidebar-logo { width: 80%; margin-bottom: 3rem; padding-left: 1rem; }
        .nav-links { list-style: none; flex-grow: 1; padding: 0; margin: 0; }
        .nav-links a { display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 1rem; border-radius: 8px; transition: 0.3s; font-weight: 600; margin-bottom: 5px; }
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 156, 225, 0.2); color: var(--neon-blue); }
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 2rem 3rem; box-sizing: border-box; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: white; padding: 1.5rem 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; margin-top: 2rem; }
        .cat-card { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; transition: 0.3s; border: 1px solid #edf2f7; display: flex; flex-direction: column;}
        .cat-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); border-color: var(--light-blue); }
        
        .cat-header { background: var(--dark-blue); color: white; padding: 20px; display: flex; align-items: center; gap: 15px; position: relative; }
        .cat-header i { font-size: 2.5rem; color: var(--neon-blue); }
        .cat-header h2 { margin: 0; font-size: 1.2rem; font-weight: 900; line-height: 1.2; }
        
        .cat-body { padding: 20px; flex-grow: 1; background: #fafcc; }
        .service-list { list-style: none; padding: 0; margin: 0; }
        .service-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px dashed #e2e8f0; color: #4a5568; font-size: 0.9rem; font-weight: 600; }
        .service-item:last-child { border-bottom: none; }
        .service-item i { color: #38a169; font-size: 1.2rem; }

        .prox-badge { background: #e53e3e; color: white; font-size: 0.65rem; padding: 3px 8px; border-radius: 5px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; display: inline-block; }
        .prox-header { background: #718096 !important; }
        .prox-header i { color: #cbd5e0 !important; }
        .prox-item i { color: #a0aec0 !important; }

        /* =========================================
           PARCHE MÓVIL ESTRICTO (APP NATIVA V2.0)
           ========================================= */
        @media (max-width: 768px) {
            html, body { overflow-x: hidden; width: 100vw; margin: 0; padding: 0; }
            body { display: block; padding-bottom: 90px; } 
            .sidebar { 
                width: 100vw; height: 70px; 
                position: fixed; bottom: 0; left: 0; top: auto; 
                display: flex; flex-direction: row; justify-content: space-between; align-items: center;
                padding: 0 5px; box-sizing: border-box; z-index: 9999; 
                border-top: 1px solid #1e293b; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); 
                border-radius: 20px 20px 0 0; background: var(--dark-blue);
            }
            .sidebar h2, .sidebar-logo { display: none; }
            .nav-links { display: flex; flex-direction: row; justify-content: space-around; width: 80%; padding: 0; margin: 0; }
            .nav-links li { display: flex; justify-content: center; align-items: center; width: 100%; }
            .nav-links a { flex-direction: column; justify-content: center; align-items: center; padding: 5px 0; gap: 4px; width: 100%; margin: 0;}
            #logoutBtn { width: 20%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px 0; gap: 4px; margin: 0; }
            .nav-links a i, #logoutBtn i { font-size: 1.6rem; margin: 0; }
            .nav-links a span, #logoutBtn span { font-size: 0.65rem; display: block; font-weight: 800; margin: 0; text-align: center; }
            
            .main-content { margin-left: 0; width: 100vw; padding: 1.5rem 1rem; box-sizing: border-box; }
            .top-bar { flex-direction: column; align-items: center; text-align: center; gap: 15px; padding: 1.5rem; width: 100%; box-sizing: border-box; }
            .top-bar > div { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
            
            .catalog-grid { grid-template-columns: 1fr; width: 100%; }
            .cat-card { width: 100%; box-sizing: border-box; }
            .cat-header { flex-direction: column; text-align: center; padding: 15px; }
            h1, h2 { text-align: center; word-wrap: break-word; font-size: 1.8rem !important; line-height: 1.2; margin-bottom: 10px;}
        }
        @media (max-width: 480px) {
            .nav-links a span, #logoutBtn span { display: none; }
            .nav-links a i, #logoutBtn i { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <img src="DigitalCore-blanco.png" alt="Digital Core" class="sidebar-logo">
        <ul class="nav-links">
            <li><a href="panel-control.html"><i class='bx bxs-dashboard'></i> <span>Dashboard</span></a></li>
            <li><a href="mis-trabajos.html"><i class='bx bxs-briefcase'></i> <span>Mis Trabajos</span></a></li>
            <li id="navColaboradores" style="display: none;"><a href="colaboradores.html"><i class='bx bxs-group'></i> <span>Equipo</span></a></li>
            <li><a href="catalogo.html" class="active"><i class='bx bxs-package'></i> <span>Catálogo</span></a></li>
        </ul>
        <button id="logoutBtn" style="background:none; border:none; color:#ff6b6b; cursor:pointer; display:flex; align-items:center; gap:15px; padding:12px 1rem; font-weight:600; margin-top: auto;">
            <i class='bx bx-log-out'></i> <span>Salir</span>
        </button>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1 style="color: var(--dark-blue); font-weight: 900; margin:0;"><i class='bx bxs-package'></i> Catálogo de Servicios</h1>
                <p style="color: #666; margin:0; font-size: 0.9rem;">Líneas de negocio de Digital Core.</p>
            </div>
            <div style="background: #f8fafc; padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; border: 1px solid #edf2f7;">
                <i class='bx bxs-user-circle' style="color: var(--light-blue); font-size: 1.4rem;"></i>
                <span id="userEmailLabel" style="font-size: 0.85rem; font-weight: 600; color: var(--dark-blue);">Cargando...</span>
            </div>
        </header>

        <div id="catalogContainer" class="catalog-grid"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ", authDomain: "digital-core-app.firebaseapp.com", projectId: "digital-core-app", storageBucket: "digital-core-app.firebasestorage.app", messagingSenderId: "1003292240722", appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app);

        const catalogoServicios = [
            { categoria: "Desarrollo Web Estratégico", icono: "bx-code-alt", proximamente: false, servicios: ["Core Event", "Core Flash", "Core Start", "Core Plus", "Core Landing", "Core Business", "Core Elite", "Core Commerce", "Core Dynamic", "Gestión de Dominios", "Hosting de Alto Rendimiento", "Correos Corporativos"] },
            { categoria: "Sistemas de Datos", icono: "bx-data", proximamente: false, servicios: ["Skill Excel", "Skill Macro", "Skill Dashboard", "Skill Cleanse", "Skill Connect", "Skill Cloud", "Hub Starter", "Hub Stock", "Hub CRM", "Hub ERP", "Hub Network", "Hub SQL", "Data Custom", "Licencia POS Básico", "Hardware POS Completo"] },
            { categoria: "Cursos y Capacitación", icono: "bx-chalkboard", proximamente: false, servicios: ["Skill Basics", "Skill Office", "Skill Cloud", "Skill Data", "Skill Code", "Skill Mentor", "Team Office", "Team Cloud", "Team Data", "Team Commerce", "Team Software", "Team Custom", "Strategy Audit", "Strategy Digital", "Strategy Tech", "Strategy Cloud", "Strategy Custom", "Strategy Support"] },
            { categoria: "Soporte e Infraestructura", icono: "bx-server", proximamente: true, servicios: ["Mantenimiento de equipos de cómputo", "Instalación de sistemas de seguridad CCTV", "Micro centros de datos corporativos"] },
            { categoria: "Identidad y Diseño Visual", icono: "bx-palette", proximamente: true, servicios: ["Creación de logotipos y branding", "Diseño de interfaces UI/UX"] },
            { categoria: "Automatización y Chatbots", icono: "bx-bot", proximamente: true, servicios: ["Implementación de flujos automáticos", "Chatbots inteligentes para WhatsApp y Messenger"] }
        ];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const email = user.email.toLowerCase().trim();
                document.getElementById('userEmailLabel').innerText = email;
                if (email === 'diego.725.reyes@gmail.com') document.getElementById('navColaboradores').style.display = 'flex';
                renderizarCatalogo();
            } else { window.location.href = 'index.html'; }
        });

        function renderizarCatalogo() {
            const container = document.getElementById('catalogContainer'); container.innerHTML = "";
            catalogoServicios.forEach(cat => {
                let headerClass = cat.proximamente ? "cat-header prox-header" : "cat-header";
                let badgeHTML = cat.proximamente ? `<span class="prox-badge">Próximamente</span>` : "";
                let itemIconClass = cat.proximamente ? "bx-time-five" : "bx-check-circle";
                let itemClass = cat.proximamente ? "service-item prox-item" : "service-item";
                let serviciosHTML = cat.servicios.map(s => `<li class="${itemClass}"><i class='bx ${itemIconClass}'></i> ${s}</li>`).join("");

                container.innerHTML += `<div class="cat-card"><div class="${headerClass}"><i class='bx ${cat.icono}'></i><div><h2>${cat.categoria}</h2>${badgeHTML}</div></div><div class="cat-body"><ul class="service-list">${serviciosHTML}</ul></div></div>`;
            });
        }
        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.href = 'index.html');
    </script>
</body>
</html>

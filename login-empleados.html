<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Corporativo | Digital Core</title>
    <link rel="icon" href="Isotipo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* CSS ESPECÍFICO PARA EL LOGIN CORPORATIVO */
        .login-wrapper {
            min-height: calc(100vh - 80px); 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 5%;
            background-color: var(--bg-light);
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 156, 225, 0.05) 0%, transparent 70%);
        }

        .login-box {
            background: var(--white);
            padding: 3rem 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(4, 31, 61, 0.08);
            border: 1px solid rgba(0, 156, 225, 0.1);
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.6s ease-out forwards;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--light-blue), var(--neon-blue));
        }

        .login-box h1 {
            color: var(--dark-blue);
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .login-box p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark-blue);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Reutilizamos tu clase form-control del styles.css */
        .login-box .form-control {
            padding: 12px 15px;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
            font-weight: 700;
        }

        .security-note {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="index.html">
                <img src="Digital Core original.png" alt="Digital Core" style="transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            </a>
        </div>
        
        <div class="menu-toggle" id="mobile-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav id="nav-menu">
            <ul style="display: flex; align-items: center;">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#servicios">Servicios</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-wrapper">
        <div class="login-box">
            <h1>Acceso Corporativo</h1>
            <p>Ingresa tus credenciales operativas.</p>

            <div class="error-message" id="errorMsg">Usuario o contraseña incorrectos.</div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="usuario">ID de Usuario</label>
                    <input type="text" id="usuario" class="form-control" placeholder="Ej. admin" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="btn-glow-container" style="width: 100%; text-align: center; margin-top: 10px;">
                    <button type="submit" class="btn" id="submitBtn" style="width: 100%; padding: 14px;">Ingresar</button>
                </div>
            </form>

            <div class="security-note">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                Área Restringida
            </div>
        </div>
    </main>

    <script>
        // Lógica del Menú Hamburguesa
        const mobileMenu = document.getElementById('mobile-menu');
        const navMenu = document.getElementById('nav-menu');
        if (mobileMenu && navMenu) {
            mobileMenu.addEventListener('click', () => {
                navMenu.classList.toggle('active');
            });
        }

        // Efecto del botón de login
        const submitBtn = document.getElementById('submitBtn');
        const btnContainer = document.querySelector('.btn-glow-container');
        if (btnContainer && submitBtn) {
            btnContainer.addEventListener('mousemove', (e) => {
                const rect = btnContainer.getBoundingClientRect();
                submitBtn.style.setProperty('--btn-x', (e.clientX - rect.left) + 'px');
                submitBtn.style.setProperty('--btn-y', (e.clientY - rect.top) + 'px');
            });
        }

        // LÓGICA DE VALIDACIÓN DE FACHADA
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue
            
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Credenciales maestras de fachada
            if (user === 'equipo' && pass === 'core2026') {
                errorMsg.style.display = 'none';
                // Si es correcto, lo manda a la segunda página oculta
                window.location.href = 'intranet.html'; 
            } else {
                // Si se equivoca, muestra error
                errorMsg.style.display = 'block';
                document.getElementById('password').value = ''; // Borra la contraseña
            }
        });
    </script>
</body>
</html>

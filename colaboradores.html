<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipo | Digital Core</title>
    <link rel="icon" href="Isotipo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --sidebar-width: 260px; --dark-blue: #0f172a; --neon-blue: #009ce1; }
        body { display: flex; background: #f0f4f8; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        
        .sidebar { width: var(--sidebar-width); height: 100vh; background: var(--dark-blue); color: white; position: fixed; padding: 2rem 1rem; box-sizing: border-box; display: flex; flex-direction: column;}
        .nav-links { list-style: none; padding: 0; margin: 0;} 
        .nav-links a { display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 1rem; border-radius: 8px; font-weight: 600; margin-bottom: 5px; transition: 0.3s;} 
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 156, 225, 0.2); color: var(--neon-blue); }
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 2rem 3rem; box-sizing: border-box; }
        
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 2rem; }
        .user-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid var(--neon-blue); cursor: pointer; transition: 0.2s; }
        .user-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); border-color: var(--dark-blue); }
        .user-card i { font-size: 4rem; color: #cbd5e0; margin-bottom: 10px; transition: 0.3s; }
        .user-card:hover i { color: var(--neon-blue); }
        .user-card h3 { margin: 0 0 5px 0; color: var(--dark-blue); }
        .user-card p { margin: 0; color: #718096; font-size: 0.85rem; }
        
        .role-badge { display: inline-block; background: #ebf8ff; color: #2b6cb0; padding: 5px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: 800; margin-top: 15px; text-transform: uppercase; }
        .role-admin { background: #fff5f5; color: #c53030; }
        .crown-icon { color: #d69e2e !important; font-size: 1.2rem !important; margin: 0 !important; vertical-align: middle; }

        /* =========================================
           MÓDULO DE OPTIMIZACIÓN MÓVIL (APP NATIVA)
           ========================================= */
        @media (max-width: 768px) {
            body { display: block; }
            .sidebar { width: 100%; height: 75px; position: fixed; bottom: 0; left: 0; top: auto; flex-direction: row; justify-content: space-around; padding: 0 5px; z-index: 9999; border-top: 1px solid #1e293b; box-shadow: 0 -5px 20px rgba(0,0,0,0.15); border-radius: 20px 20px 0 0; }
            .sidebar h2, .sidebar-logo { display: none; }
            .nav-links { display: flex; flex-direction: row; width: 100%; justify-content: space-around; align-items: center; }
            .nav-links li { width: auto; flex-grow: 1; }
            .nav-links a { flex-direction: column; padding: 8px 0; gap: 4px; border-radius: 12px; text-align: center; margin: 0 2px;}
            .nav-links a i { font-size: 1.6rem; margin: 0; }
            .nav-links a span { font-size: 0.65rem; display: block; font-weight: 800; }
            #logoutBtn { padding: 10px; flex-direction: column; gap: 4px; margin: 0; width: auto;}
            #logoutBtn span { display: none; }
            #logoutBtn i { font-size: 1.6rem; margin: 0; }

            .main-content { margin-left: 0; width: 100%; padding: 1.5rem 1rem 95px 1rem; }
            .user-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.6rem !important; line-height: 1.2; }
        }
        @media (max-width: 480px) {
            .nav-links a span { display: none; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2 style="padding-left: 1rem; color: #38bdf8; margin-bottom: 2rem;">Digital Core</h2>
        <ul class="nav-links">
            <li><a href="panel-control.html"><i class='bx bxs-dashboard'></i> <span>Dashboard</span></a></li>
            <li><a href="mis-trabajos.html"><i class='bx bxs-briefcase'></i> <span>Mis Trabajos</span></a></li>
            <li id="navColaboradores"><a href="colaboradores.html" class="active"><i class='bx bxs-group'></i> <span>Equipo</span></a></li>
            <li><a href="catalogo.html"><i class='bx bxs-package'></i> <span>Catálogo</span></a></li>
        </ul>
        <button id="logoutBtn" style="background:none; border:none; color:#ff6b6b; cursor:pointer; margin-top: auto; font-weight:600; display:flex; gap:10px;"><i class='bx bx-log-out'></i> Salir</button>
    </aside>

    <main class="main-content">
        <h1 style="color: var(--dark-blue); font-weight: 900; margin-bottom: 5px;"><i class='bx bxs-group'></i> Directorio de Equipo</h1>
        <p style="color: #718096; margin-top: 0;">Selecciona a un colaborador para ver sus métricas de desempeño.</p>
        
        <div id="usersBoard" class="user-grid">
            <div style="text-align: center; grid-column: 1/-1; padding: 3rem;"><i class='bx bx-loader-alt bx-spin' style="font-size: 3rem; color: var(--neon-blue);"></i></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ", authDomain: "digital-core-app.firebaseapp.com", projectId: "digital-core-app", storageBucket: "digital-core-app.firebasestorage.app", messagingSenderId: "1003292240722", appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if (user.email.toLowerCase().trim() !== 'diego.725.reyes@gmail.com') {
                    window.location.href = 'panel-control.html'; 
                } else {
                    cargarUsuarios();
                }
            } else { window.location.href = 'index.html'; }
        });

        function cargarUsuarios() {
            onSnapshot(collection(db, "usuarios"), (snap) => {
                let usuarios = [];
                snap.forEach(d => usuarios.push(d.data()));

                usuarios.sort((a, b) => {
                    const esAdminA = a.correo === 'diego.725.reyes@gmail.com';
                    const esAdminB = b.correo === 'diego.725.reyes@gmail.com';
                    if (esAdminA && !esAdminB) return -1;
                    if (!esAdminA && esAdminB) return 1;
                    return a.nombre.localeCompare(b.nombre);
                });

                const board = document.getElementById('usersBoard'); board.innerHTML = '';
                
                usuarios.forEach(u => {
                    const esAdmin = u.correo === 'diego.725.reyes@gmail.com';
                    const badgeClass = esAdmin ? 'role-badge role-admin' : 'role-badge';
                    const iconHeader = esAdmin ? "<i class='bx bxs-crown crown-icon'></i> " : "";
                    
                    board.innerHTML += `
                        <div class="user-card" onclick="window.location.href='detalles-colaborador.html?correo=${u.correo}'">
                            <i class='bx bxs-user-circle'></i>
                            <h3>${iconHeader}${u.nombre}</h3>
                            <p>${u.correo}</p>
                            <span class="${badgeClass}">${u.rol || 'Colaborador'}</span>
                        </div>
                    `;
                });
            });
        }
        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => window.location.href = 'index.html');
    </script>
</body>
</html>

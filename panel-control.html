<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Panel | Digital Core</title>
    <link rel="icon" href="Isotipo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { --sidebar-width: 260px; }
        body { display: flex; background: #f0f4f8; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width); height: 100vh; background: var(--dark-blue);
            color: white; position: fixed; padding: 2rem 1rem; display: flex;
            flex-direction: column; z-index: 100;
        }
        .sidebar-logo { width: 80%; margin-bottom: 3rem; padding-left: 1rem; }
        .nav-links { list-style: none; flex-grow: 1; padding: 0; }
        .nav-links a {
            display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7);
            text-decoration: none; padding: 12px 1rem; border-radius: 8px; transition: 0.3s; font-weight: 600;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 156, 225, 0.2); color: var(--neon-blue); }

        /* MAIN CONTENT */
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 2rem 3rem; }
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2rem; background: white; padding: 1.5rem 2rem; 
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        /* FORMULARIO AVANZADO */
        .content-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.8rem; font-weight: 700; color: var(--dark-blue); }
        .form-control { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 0.9rem; }
        .form-control:focus { border-color: var(--neon-blue); outline: none; }
        
        /* TARJETAS DE PROYECTO */
        .board-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .project-card { 
            background: white; border-radius: 15px; padding: 20px; 
            border: 1px solid rgba(0, 156, 225, 0.1); transition: 0.3s; 
        }
        .project-card:hover { transform: translateY(-5px); border-color: var(--neon-blue); }
        .badge { font-size: 0.65rem; padding: 4px 12px; border-radius: 50px; font-weight: 900; text-transform: uppercase; }
        .status-proceso { background: #fff3e0; color: #ef6c00; }
        
        .progress-container { height: 8px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--light-blue), var(--neon-blue)); transition: 1s ease; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; } .sidebar span, .sidebar-logo { display: none; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <img src="Digital Core original.png" alt="Logo" class="sidebar-logo">
        <ul class="nav-links">
            <li><a href="#" class="active"><i class='bx bxs-dashboard'></i> <span>Dashboard</span></a></li>
            <li><a href="#"><i class='bx bxs-briefcase'></i> <span>Mis Trabajos</span></a></li>
            <li><a href="#"><i class='bx bxs-group'></i> <span>Colaboradores</span></a></li>
            <li><a href="#"><i class='bx bxs-package'></i> <span>Catálogo</span></a></li>
        </ul>
        <button id="logoutBtn" style="background:none; border:none; color:#ff6b6b; cursor:pointer; display:flex; align-items:center; gap:15px; padding:12px 1rem; font-weight:600; margin-top: auto;">
            <i class='bx bx-log-out'></i> <span>Cerrar Sesión</span>
        </button>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1 id="userNameWelcome" style="color: var(--dark-blue); font-weight: 900; margin:0;">Cargando...</h1>
                <p id="roleLabel" style="color: #666; margin:0; font-size: 0.9rem;">Verificando permisos operativos...</p>
            </div>
            <div style="background: #f8fafc; padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; border: 1px solid #edf2f7;">
                <i class='bx bxs-user-circle' style="color: var(--light-blue); font-size: 1.4rem;"></i>
                <span id="userEmailLabel" style="font-size: 0.85rem; font-weight: 600; color: var(--dark-blue);">...</span>
            </div>
        </header>

        <section id="adminOnlySection" style="display: none;">
            <div class="content-card" style="border-left: 6px solid var(--neon-blue);">
                <h2 style="color: var(--dark-blue); margin-bottom: 1.5rem;"><i class='bx bx-plus-circle'></i> Alta de Nuevo Proyecto</h2>
                <form id="addProjectForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Categoría del Servicio</label>
                            <select id="projCategory" class="form-control" onchange="actualizarProductos()" required>
                                <option value="">Selecciona una categoría...</option>
                                <option value="Desarrollo Web Estratégico">Desarrollo Web Estratégico</option>
                                <option value="Sistemas de Datos">Sistemas de Datos</option>
                                <option value="Cursos, Capacitación y Consultoría">Cursos, Capacitación y Consultoría</option>
                                <option value="Soporte e Infraestructura">Soporte e Infraestructura</option>
                                <option value="Identidad y Diseño Visual">Identidad y Diseño Visual</option>
                                <option value="Automatización y Chatbots">Automatización y Chatbots</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Producto / Paquete</label>
                            <select id="projProduct" class="form-control" required disabled>
                                <option value="">Primero selecciona categoría...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Cliente / Empresa</label>
                            <input type="text" id="projClient" class="form-control" placeholder="Nombre del cliente" required>
                        </div>
                        <div class="form-group">
                            <label>Fecha de Entrega</label>
                            <input type="date" id="projDeadline" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Asignar a Colaborador</label>
                            <select id="projAssign" class="form-control" required>
                                <option value="diego.725.reyes@gmail.com">Diego Reyes (Admin)</option>
                                <option value="ptres2499@gmail.com">Admin Secundario</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Estado Inicial</label>
                            <select id="projStatus" class="form-control">
                                <option value="En proceso">En proceso</option>
                                <option value="Pendiente">Pendiente</option>
                                <option value="Urgente">Urgente</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; margin-top: 20px; padding: 14px; font-weight: 800; letter-spacing: 1px;">
                        <i class='bx bx-cloud-upload'></i> LANZAR PROYECTO A LA NUBE
                    </button>
                </form>
            </div>
        </section>

        <section class="content-card">
            <h2 style="color: var(--dark-blue); margin-bottom: 25px;"><i class='bx bx-objects-horizontal-left'></i> Proyectos Activos</h2>
            <div id="projectBoard" class="board-container">
                <p style="color: #888;">Sincronizando con base de datos...</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ",
            authDomain: "digital-core-app.firebaseapp.com",
            projectId: "digital-core-app",
            storageBucket: "digital-core-app.firebasestorage.app",
            messagingSenderId: "1003292240722",
            appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b",
            measurementId: "G-SX61ZVLJF0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // LÓGICA DINÁMICA DE PRODUCTOS
        window.actualizarProductos = function() {
            const categoria = document.getElementById('projCategory').value;
            const productoSelect = document.getElementById('projProduct');
            
            const productos = {
                "Desarrollo Web Estratégico": ["Core Flash", "Core Launch", "Core Flow", "Invitación Digital"],
                "Sistemas de Datos": ["Punto de Venta (POS)", "App Móvil", "Dashboard Analítico"],
                "Cursos, Capacitación y Consultoría": ["Taller Tech", "Consultoría Estratégica"],
                "Soporte e Infraestructura": ["Mantenimiento Correctivo", "Instalación CCTV"],
                "Identidad y Diseño Visual": ["Branding Logo", "Diseño UI/UX"],
                "Automatización y Chatbots": ["Chatbot WhatsApp", "Flujo Automatizado"]
            };

            productoSelect.innerHTML = '<option value="">Selecciona el producto...</option>';
            
            if (categoria && productos[categoria]) {
                productoSelect.disabled = false;
                productos[categoria].forEach(prod => {
                    const opt = document.createElement('option');
                    opt.value = prod; opt.textContent = prod;
                    productoSelect.appendChild(opt);
                });
            } else { productoSelect.disabled = true; }
        };

        // ACCESO Y ROLES
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmailLabel').innerText = user.email;
                if (user.email === 'diego.725.reyes@gmail.com') {
                    document.getElementById('userNameWelcome').innerText = "¡Bienvenido, Director!";
                    document.getElementById('roleLabel').innerText = "Gestión Maestra de Digital Core";
                    document.getElementById('adminOnlySection').style.display = 'block';
                } else {
                    document.getElementById('userNameWelcome').innerText = "Panel Operativo";
                    document.getElementById('roleLabel').innerText = "Consultoría y Desarrollo";
                }
                cargarProyectos();
            } else { window.location.href = 'intranet.html'; }
        });

        // REGISTRO DE DATOS
        const projectForm = document.getElementById('addProjectForm');
        projectForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "proyectos"), {
                    nombre: document.getElementById('projProduct').value + " - " + document.getElementById('projClient').value,
                    categoria: document.getElementById('projCategory').value,
                    producto: document.getElementById('projProduct').value,
                    cliente: document.getElementById('projClient').value,
                    entrega: document.getElementById('projDeadline').value,
                    asignado_a: document.getElementById('projAssign').value,
                    estado: document.getElementById('projStatus').value,
                    progreso: 0,
                    creado: serverTimestamp()
                });
                alert("Éxito: El proyecto ya está en la base de datos.");
                projectForm.reset();
                document.getElementById('projProduct').disabled = true;
            } catch (err) { alert("Error crítico: " + err.message); }
        });

        // TABLERO EN TIEMPO REAL
        function cargarProyectos() {
            const q = query(collection(db, "proyectos"), orderBy("creado", "desc"));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('projectBoard');
                container.innerHTML = "";
                snap.forEach((doc) => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="project-card">
                            <div style="display:flex; justify-content:space-between; align-items:start;">
                                <div>
                                    <span style="font-size:0.65rem; color:var(--light-blue); font-weight:800;">${data.categoria}</span>
                                    <h3 style="margin:2px 0; font-size:1rem; color:var(--dark-blue);">${data.producto}</h3>
                                    <p style="font-size:0.75rem; color:#888; margin:0;">Cliente: ${data.cliente}</p>
                                </div>
                                <span class="badge status-proceso">${data.estado}</span>
                            </div>
                            <div class="progress-container"><div class="progress-bar" style="width:${data.progreso}%"></div></div>
                            <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:700;">
                                <span style="color:#666;">Entrega: ${data.entrega}</span>
                                <span style="color:var(--dark-blue); text-decoration: underline;">${data.asignado_a.split('@')[0]}</span>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // SALIDA
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        });
    </script>
</body>
</html>

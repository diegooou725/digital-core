<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Digital Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; margin: 0; display: flex; }
        .main-content { padding: 2rem; width: 100%; margin-left: 260px; }
        .sidebar { width: 260px; height: 100vh; background: #0f172a; position: fixed; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .task-card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid #cbd5e0; cursor:pointer; }
        .st-demorada { border-left-color: #e53e3e; } .badge-demorada { background: #fff5f5; color:#e53e3e; font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; }
        .st-proceso { border-left-color: #3182ce; } .badge-proceso { background: #ebf8ff; color:#3182ce; font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; }
        .st-asignada { border-left-color: #718096; } .badge-asignada { background: #f7fafc; color:#718096; font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; }
        .st-completada { border-left-color: #38a169; } .badge-completada { background: #f0fff4; color:#38a169; font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; }
    </style>
</head>
<body>
    <aside class="sidebar"> </aside>
    <main class="main-content">
        <h2>Dashboard Principal (Top 3 Prioridades)</h2>
        <div id="top3Board" class="card-grid"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ", authDomain: "digital-core-app.firebaseapp.com", projectId: "digital-core-app", storageBucket: "digital-core-app.firebasestorage.app", messagingSenderId: "1003292240722", appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) renderizarDashboard(user.email.toLowerCase().trim(), user.email === 'diego.725.reyes@gmail.com');
        });

        function renderizarDashboard(email, isAdmin) {
            const q = isAdmin ? collection(db, "proyectos") : query(collection(db, "proyectos"), where("asignado_a", "==", email));
            
            onSnapshot(q, (snap) => {
                let tareas = [];
                snap.forEach(d => tareas.push({ id: d.id, ...d.data() }));

                // 1. ORDENAR: Incompletas primero, luego por fecha límite (las que vencen antes van primero)
                tareas.sort((a, b) => {
                    if (a.completado === b.completado) return new Date(a.entrega) - new Date(b.entrega);
                    return a.completado ? 1 : -1;
                });

                // 2. RECORTAR A 3 TAREAS MAXIMO
                const top3 = tareas.slice(0, 3);
                
                // 3. LOGICA DE ESTADO ESTRICTA (1 a la vez)
                let hayUnaEnProceso = false;
                const hoy = new Date().toISOString().split('T')[0];

                const container = document.getElementById('top3Board');
                container.innerHTML = "";

                top3.forEach(p => {
                    let estadoStr = ""; let claseEst = ""; let badgeClass = "";
                    
                    if (p.completado) {
                        estadoStr = "COMPLETADA"; claseEst = "st-completada"; badgeClass = "badge-completada";
                    } else if (p.entrega < hoy) {
                        estadoStr = "DEMORADA"; claseEst = "st-demorada"; badgeClass = "badge-demorada";
                    } else if (p.progreso > 0 && !hayUnaEnProceso) {
                        // La primera que tenga progreso > 0 gana el título de "En Proceso"
                        estadoStr = "EN PROCESO"; claseEst = "st-proceso"; badgeClass = "badge-proceso";
                        hayUnaEnProceso = true; 
                    } else {
                        estadoStr = "ASIGNADA"; claseEst = "st-asignada"; badgeClass = "badge-asignada";
                    }

                    container.innerHTML += `
                        <div class="task-card ${claseEst}" onclick="window.location.href='detalles-tarea.html?id=${p.id}'">
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                <span class="${badgeClass}"><b>${estadoStr}</b></span>
                                <span style="font-size:0.7rem; color:#a0aec0;">Vence: ${p.entrega}</span>
                            </div>
                            <h3 style="margin:5px 0; font-size:1rem;">${p.producto}</h3>
                            <div style="background:#edf2f7; height:6px; border-radius:10px; margin:10px 0;">
                                <div style="width:${p.progreso}%; background:var(--neon-blue); height:100%;"></div>
                            </div>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>

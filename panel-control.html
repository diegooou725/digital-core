<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Digital Core</title>
    <link rel="icon" href="Isotipo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { --sidebar-width: 260px; }
        body { display: flex; background: #f0f4f8; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width); height: 100vh; background: var(--dark-blue);
            color: white; position: fixed; padding: 2rem 1rem; display: flex;
            flex-direction: column; z-index: 100;
        }
        .sidebar-logo { width: 80%; margin-bottom: 3rem; padding-left: 1rem; }
        .nav-links { list-style: none; flex-grow: 1; padding: 0; }
        .nav-links a {
            display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7);
            text-decoration: none; padding: 12px 1rem; border-radius: 8px; transition: 0.3s; font-weight: 600;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 156, 225, 0.2); color: var(--neon-blue); }

        /* MAIN CONTENT */
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 2rem 3rem; }
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2rem; background: white; padding: 1.5rem 2rem; 
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        /* CARDS Y FORMULARIO */
        .content-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; font-family: inherit; }
        
        /* TABLERO DE PROYECTOS */
        .board-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .project-card { 
            background: white; border-radius: 15px; padding: 20px; 
            border: 1px solid rgba(0, 156, 225, 0.1); transition: 0.3s; 
            position: relative; overflow: hidden;
        }
        .project-card:hover { transform: translateY(-5px); border-color: var(--neon-blue); }
        .status-badge { font-size: 0.7rem; padding: 4px 10px; border-radius: 50px; font-weight: 700; text-transform: uppercase; }
        .status-ontime { background: #e3f2fd; color: #1976d2; }
        
        .progress-container { height: 8px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--light-blue), var(--neon-blue)); transition: 0.8s ease-in-out; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; } .sidebar span, .sidebar-logo { display: none; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <img src="Digital Core original.png" alt="Logo" class="sidebar-logo">
        <ul class="nav-links">
            <li><a href="#" class="active"><i class='bx bxs-dashboard'></i> <span>Dashboard</span></a></li>
            <li><a href="#"><i class='bx bxs-briefcase'></i> <span>Mis Trabajos</span></a></li>
            <li><a href="#"><i class='bx bxs-package'></i> <span>Catálogo</span></a></li>
        </ul>
        <button id="logoutBtn" style="background:none; border:none; color:#ff6b6b; cursor:pointer; display:flex; align-items:center; gap:15px; padding:12px 1rem; font-weight:600; margin-top: auto;">
            <i class='bx bx-log-out'></i> <span>Cerrar Sesión</span>
        </button>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1 id="userNameWelcome" style="color: var(--dark-blue); font-weight: 900; margin:0;">Cargando...</h1>
                <p id="roleLabel" style="color: #666; margin:0; font-size: 0.9rem;">Verificando credenciales...</p>
            </div>
            <div style="background: #f8fafc; padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; border: 1px solid #edf2f7;">
                <i class='bx bxs-user-circle' style="color: var(--light-blue); font-size: 1.4rem;"></i>
                <span id="userEmailLabel" style="font-size: 0.85rem; font-weight: 600; color: var(--dark-blue);">...</span>
            </div>
        </header>

        <section id="adminOnlySection" style="display: none;">
            <div class="content-card" style="border-top: 4px solid var(--neon-blue);">
                <h2 style="color: var(--dark-blue); margin-bottom: 1.5rem;"><i class='bx bx-plus-circle'></i> Registrar Nuevo Proyecto</h2>
                <form id="addProjectForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label style="font-weight:700; font-size:0.8rem;">Nombre del Proyecto</label>
                            <input type="text" id="projName" class="form-control" placeholder="Ej. E-commerce Galletas" required>
                        </div>
                        <div class="form-group">
                            <label style="font-weight:700; font-size:0.8rem;">Cliente</label>
                            <input type="text" id="projClient" class="form-control" placeholder="Nombre de la empresa" required>
                        </div>
                        <div class="form-group">
                            <label style="font-weight:700; font-size:0.8rem;">Asignar a (Email)</label>
                            <input type="email" id="projAssign" class="form-control" placeholder="colaborador@digitalcore.com" required>
                        </div>
                        <div class="form-group">
                            <label style="font-weight:700; font-size:0.8rem;">Estado Inicial</label>
                            <select id="projStatus" class="form-control">
                                <option value="En tiempo">En tiempo</option>
                                <option value="Urgente">Urgente</option>
                                <option value="Atrasado">Atrasado</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; margin-top: 15px; padding: 14px; font-weight: 700;">
                        <i class='bx bx-cloud-upload'></i> PUBLICAR EN EL SISTEMA
                    </button>
                </form>
            </div>
        </section>

        <section class="content-card">
            <h2 style="color: var(--dark-blue); margin-bottom: 25px;"><i class='bx bx-list-ul'></i> Seguimiento de Proyectos</h2>
            <div id="projectBoard" class="board-container">
                <p style="color: #888;">Conectando con la base de datos...</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ",
            authDomain: "digital-core-app.firebaseapp.com",
            projectId: "digital-core-app",
            storageBucket: "digital-core-app.firebasestorage.app",
            messagingSenderId: "1003292240722",
            appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b",
            measurementId: "G-SX61ZVLJF0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // LÓGICA DE ROLES Y ACCESO
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmailLabel').innerText = user.email;
                
                if (user.email === 'diego.725.reyes@gmail.com') {
                    document.getElementById('userNameWelcome').innerText = "¡Bienvenido, Director!";
                    document.getElementById('roleLabel').innerText = "Panel de Administración Maestro";
                    document.getElementById('adminOnlySection').style.display = 'block';
                } else {
                    document.getElementById('userNameWelcome').innerText = "Panel de Colaborador";
                    document.getElementById('roleLabel').innerText = "Operaciones Digital Core";
                    document.getElementById('adminOnlySection').style.display = 'none';
                }
                cargarProyectos();
            } else {
                window.location.href = 'intranet.html';
            }
        });

        // GUARDAR PROYECTO (ADMIN)
        const projectForm = document.getElementById('addProjectForm');
        projectForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "proyectos"), {
                    nombre: document.getElementById('projName').value,
                    cliente: document.getElementById('projClient').value,
                    asignado_a: document.getElementById('projAssign').value,
                    estado: document.getElementById('projStatus').value,
                    progreso: 0,
                    fecha: serverTimestamp()
                });
                alert("Proyecto publicado correctamente.");
                projectForm.reset();
            } catch (err) { alert("Error de conexión: " + err.message); }
        });

        // LECTURA EN TIEMPO REAL
        function cargarProyectos() {
            const q = query(collection(db, "proyectos"), orderBy("fecha", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('projectBoard');
                container.innerHTML = "";
                
                if (snapshot.empty) {
                    container.innerHTML = "<p style='color:#888;'>No hay proyectos activos por ahora.</p>";
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="project-card">
                            <div style="display:flex; justify-content:space-between; align-items:start;">
                                <div>
                                    <h3 style="margin:0; font-size:1.1rem; color:var(--dark-blue);">${data.nombre}</h3>
                                    <span style="font-size:0.75rem; color:#888;">Cliente: ${data.cliente}</span>
                                </div>
                                <span class="status-badge status-ontime">${data.estado}</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar" style="width:${data.progreso}%"></div>
                            </div>
                            <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:600;">
                                <span>Progreso: ${data.progreso}%</span>
                                <span style="color:var(--light-blue);"><i class='bx bxs-user'></i> ${data.asignado_a.split('@')[0]}</span>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // SALIR
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        });
    </script>
</body>
</html>

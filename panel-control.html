<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Panel | Digital Core</title>
    <link rel="icon" href="Isotipo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { --sidebar-width: 260px; }
        body { display: flex; background: #f0f4f8; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        .sidebar { width: var(--sidebar-width); height: 100vh; background: var(--dark-blue); color: white; position: fixed; padding: 2rem 1rem; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-logo { width: 80%; margin-bottom: 3rem; padding-left: 1rem; }
        .nav-links { list-style: none; flex-grow: 1; padding: 0; }
        .nav-links a { display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 1rem; border-radius: 8px; transition: 0.3s; font-weight: 600; }
        .nav-links a:hover, .nav-links a.active { background: rgba(0, 156, 225, 0.2); color: var(--neon-blue); }
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 2rem 3rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: white; padding: 1.5rem 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .content-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-control { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; width: 100%; box-sizing: border-box; }
        .btn-primary { background: var(--neon-blue); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 20px; }
        .board-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .project-card { background: white; border-radius: 15px; padding: 20px; border: 1px solid rgba(0, 156, 225, 0.1); position: relative; }
        .delete-btn { position: absolute; top: 15px; right: 15px; color: #ff6b6b; cursor: pointer; font-size: 1.2rem; }
        .progress-container { height: 8px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--light-blue), var(--neon-blue)); transition: 0.5s; }
        .control-btn { background: #eee; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-weight: 900; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span, .sidebar-logo { display: none; } .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 1.5rem; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <img src="Digital Core original.png" alt="Logo" class="sidebar-logo">
        <ul class="nav-links">
            <li><a href="panel-control.html" class="active"><i class='bx bxs-dashboard'></i> <span>Dashboard</span></a></li>
            <li><a href="#"><i class='bx bxs-briefcase'></i> <span>Mis Trabajos</span></a></li>
            <li><a href="colaboradores.html"><i class='bx bxs-group'></i> <span>Colaboradores</span></a></li>
            <li><a href="#"><i class='bx bxs-package'></i> <span>Catálogo</span></a></li>
        </ul>
        <button id="logoutBtn" style="background:none; border:none; color:#ff6b6b; cursor:pointer; display:flex; align-items:center; gap:15px; padding:12px 1rem; font-weight:600; margin-top: auto;">
            <i class='bx bx-log-out'></i> <span>Cerrar Sesión</span>
        </button>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1 id="userNameWelcome" style="color: var(--dark-blue); font-weight: 900; margin:0;">Iniciando...</h1>
                <p id="roleLabel" style="color: #666; margin:0; font-size: 0.9rem;">Digital Core System</p>
            </div>
            <div style="background: #f8fafc; padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; border: 1px solid #edf2f7;">
                <i class='bx bxs-user-circle' style="color: var(--light-blue); font-size: 1.4rem;"></i>
                <span id="userEmailLabel" style="font-size: 0.85rem; font-weight: 600; color: var(--dark-blue);">Cargando...</span>
            </div>
        </header>

        <section id="adminOnlySection" style="display: none;">
            <div class="content-card">
                <h2 style="color: var(--dark-blue); margin-bottom: 1.5rem;"><i class='bx bx-plus-circle'></i> Nuevo Proyecto</h2>
                <form id="addProjectForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Categoría</label>
                            <select id="projCategory" class="form-control" onchange="actualizarProductos()" required>
                                <option value="">Selecciona categoría...</option>
                                <option value="Desarrollo Web Estratégico">Desarrollo Web Estratégico</option>
                                <option value="Sistemas de Datos">Sistemas de Datos</option>
                                <option value="Cursos, Capacitación y Consultoría">Cursos, Capacitación y Consultoría</option>
                                <option value="Soporte e Infraestructura">Soporte e Infraestructura</option>
                                <option value="Identidad y Diseño Visual">Identidad y Diseño Visual</option>
                                <option value="Automatización y Chatbots">Automatización y Chatbots</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Producto</label>
                            <select id="projProduct" class="form-control" required disabled><option value="">Selecciona...</option></select>
                        </div>
                        <div class="form-group">
                            <label>Cliente</label>
                            <input type="text" id="projClient" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Fecha Entrega</label>
                            <input type="date" id="projDeadline" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Asignar a</label>
                            <select id="projAssign" class="form-control" required><option value="">Cargando equipo...</option></select>
                        </div>
                        <div class="form-group">
                            <label>Estado</label>
                            <select id="projStatus" class="form-control">
                                <option value="En proceso">En proceso</option>
                                <option value="Urgente">Urgente</option>
                                <option value="Pendiente">Pendiente</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">PUBLICAR PROYECTO</button>
                </form>
            </div>
        </section>

        <section class="content-card">
            <h2 id="boardTitle" style="color: var(--dark-blue); margin-bottom: 25px;"><i class='bx bx-list-ul'></i> Cargando Tareas...</h2>
            <div id="projectBoard" class="board-container"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, where, updateDoc, doc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlouup64jteDrbUkOkSSEqsjesnuT6mdQ",
            authDomain: "digital-core-app.firebaseapp.com",
            projectId: "digital-core-app",
            storageBucket: "digital-core-app.firebasestorage.app",
            messagingSenderId: "1003292240722",
            appId: "1:1003292240722:web:b2a2af0665df1ef00fe88b",
            measurementId: "G-SX61ZVLJF0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- MÓDULO 1: UI Y PRODUCTOS ---
        window.actualizarProductos = function() {
            const cat = document.getElementById('projCategory').value;
            const prod = document.getElementById('projProduct');
            const lista = {
                "Desarrollo Web Estratégico": ["Core Flash", "Core Launch", "Core Flow", "Invitación Digital"],
                "Sistemas de Datos": ["Punto de Venta (POS)", "App Móvil", "Dashboard Analítico"],
                "Cursos, Capacitación y Consultoría": ["Taller Tech", "Consultoría Estratégica"],
                "Soporte e Infraestructura": ["Mantenimiento Correctivo", "Instalación CCTV"],
                "Identidad y Diseño Visual": ["Branding Logo", "Diseño UI/UX"],
                "Automatización y Chatbots": ["Chatbot WhatsApp", "Flujo Automatizado"]
            };
            prod.innerHTML = '<option value="">Selecciona...</option>';
            if (cat && lista[cat]) { prod.disabled = false; lista[cat].forEach(p => { let o = document.createElement('option'); o.value = p; o.textContent = p; prod.appendChild(o); }); } else { prod.disabled = true; }
        };

        // --- MÓDULO 2: VINCULACIÓN DE EQUIPO ---
        async function vincularEquipo() {
            const select = document.getElementById('projAssign');
            onSnapshot(collection(db, "usuarios"), (snap) => {
                select.innerHTML = '<option value="">Selecciona integrante...</option>';
                snap.forEach((doc) => {
                    const u = doc.data();
                    let o = document.createElement('option');
                    o.value = u.correo.toLowerCase().trim();
                    o.textContent = `${u.nombre} (${u.rol})`;
                    select.appendChild(o);
                });
            });
        }

        // --- MÓDULO 3: LÓGICA DE TABLERO (EL "CORAZÓN") ---
        function inicializarTablero(email, esAdmin) {
            // Referencia base a la colección
            const proyectosRef = collection(db, "proyectos");
            
            // Definimos la consulta: Si es admin ve todo, si no, filtramos por 'asignado_a'
            const q = esAdmin ? proyectosRef : query(proyectosRef, where("asignado_a", "==", email));

            // Escucha activa en tiempo real
            onSnapshot(q, (snap) => {
                const container = document.getElementById('projectBoard');
                container.innerHTML = "";

                if (snap.empty) {
                    container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: #888; background:white; border-radius:15px;"><p>No se encontraron tareas registradas para este usuario.</p></div>`;
                    return;
                }

                snap.forEach((d) => {
                    const p = d.data();
                    container.innerHTML += `
                        <div class="project-card">
                            ${esAdmin ? `<i class='bx bx-trash delete-btn' onclick="eliminarProyecto('${d.id}')"></i>` : ''}
                            <span style="font-size:0.6rem; color:var(--light-blue); font-weight:800; text-transform:uppercase;">${p.categoria}</span>
                            <h3 style="margin:5px 0; font-size:1rem; color:var(--dark-blue);">${p.producto}</h3>
                            <p style="font-size:0.75rem; color:#888;">Cliente: <b>${p.cliente}</b></p>
                            <div class="progress-container"><div class="progress-bar" style="width:${p.progreso}%"></div></div>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <button class="control-btn" onclick="cambiarProgreso('${d.id}', ${p.progreso}, -10)">-</button>
                                <span style="font-weight:bold; font-size:0.9rem;">${p.progreso}%</span>
                                <button class="control-btn" onclick="cambiarProgreso('${d.id}', ${p.progreso}, 10)">+</button>
                            </div>
                            <div style="margin-top:15px; display:flex; justify-content:space-between; font-size:0.7rem; align-items:center;">
                                <span><i class='bx bx-calendar'></i> ${p.entrega}</span>
                                <span style="font-weight:900; color:var(--dark-blue); background:#f0f4f8; padding:3px 8px; border-radius:4px;">${p.asignado_a.split('@')[0]}</span>
                            </div>
                        </div>`;
                });
            });
        }

        // --- MÓDULO 4: AUTENTICACIÓN Y ARRANQUE ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userEmail = user.email.toLowerCase().trim();
                const isAdmin = userEmail === 'diego.725.reyes@gmail.com';
                
                document.getElementById('userEmailLabel').innerText = userEmail;

                // Buscamos perfil en la colección usuarios
                const qUser = query(collection(db, "usuarios"), where("correo", "==", userEmail));
                const userSnap = await getDocs(qUser);
                
                if (!userSnap.empty) {
                    const uData = userSnap.docs[0].data();
                    document.getElementById('userNameWelcome').innerText = `¡Hola, ${uData.nombre.split(' ')[0]}!`;
                    document.getElementById('roleLabel').innerText = uData.rol;
                }

                if (isAdmin) {
                    document.getElementById('adminOnlySection').style.display = 'block';
                    document.getElementById('boardTitle').innerHTML = "<i class='bx bx-globe'></i> Tablero Maestro (Global)";
                    vincularEquipo();
                } else {
                    document.getElementById('boardTitle').innerHTML = "<i class='bx bx-briefcase'></i> Mis Tareas Asignadas";
                }

                // ARRANQUE DEL TABLERO
                inicializarTablero(userEmail, isAdmin);

            } else {
                window.location.href = 'intranet.html';
            }
        });

        // --- MÓDULO 5: FUNCIONES DE ACCIÓN ---
        document.getElementById('addProjectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "proyectos"), {
                    categoria: document.getElementById('projCategory').value,
                    producto: document.getElementById('projProduct').value,
                    cliente: document.getElementById('projClient').value,
                    entrega: document.getElementById('projDeadline').value,
                    asignado_a: document.getElementById('projAssign').value,
                    estado: document.getElementById('projStatus').value,
                    progreso: 0,
                    creado: serverTimestamp()
                });
                alert("Proyecto publicado correctamente.");
                document.getElementById('addProjectForm').reset();
            } catch (err) { console.error(err); }
        });

        window.eliminarProyecto = async (id) => { if(confirm("¿Borrar proyecto?")) await deleteDoc(doc(db, "proyectos", id)); };
        window.cambiarProgreso = async (id, actual, cambio) => { 
            let n = Math.min(100, Math.max(0, actual + cambio)); 
            await updateDoc(doc(db, "proyectos", id), { progreso: n }); 
        };

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => window.location.href = 'index.html'));
    </script>
</body>
</html>
